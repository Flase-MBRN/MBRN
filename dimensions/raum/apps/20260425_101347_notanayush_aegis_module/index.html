<div id="result-area"></div>

<script>
function detectEmergency(signal) {
  const emergencies = ["fire", "medical emergency", "active shooter"];
  const lowerSignal = signal.toLowerCase();
  return emergencies.some(keyword => lowerSignal.includes(keyword));
}

function testDetectEmergency() {
  const testSignals = [
    "Please send help, there's a fire!",
    "I need medical assistance.",
    "There's an active shooter in the building."
  ];

  const expectedResults = [true, true, true];
  const results = testSignals.map(signal => detectEmergency(signal));

  if (results.length !== expectedResults.length) {
    console.error("Test failed: Different number of signals and results.");
    return false;
  }

  for (let i = 0; i < results.length; i++) {
    if (results[i] !== expectedResults[i]) {
      console.error(`Test failed at index ${i}: ${results[i]} != ${expectedResults[i]}`);
      return false;
    }
  }

  console.log("Test passed!");
  return true;
}

document.getElementById('check-button').addEventListener('click', function() {
  const signalInput = document.getElementById('signal-input').value;
  const resultArea = document.getElementById('result-area');
  const isEmergency = detectEmergency(signalInput);

  resultArea.innerHTML = `Result: ${isEmergency ? 'Emergency Detected' : 'No Emergency'}`;
});

// Self-test execution
try {
  testDetectEmergency();
} catch (error) {
  console.error(error);
}

console.log("MODULE_READY: NotAnAyush_Aegis");

// Additional functionality:  Simulate a random signal generator
function generateRandomSignal() {
  const signalTypes = ["fire", "medical emergency", "active shooter", "routine check", "system test"];
  const randomType = signalTypes[Math.floor(Math.random() * signalTypes.length)];

  let signal = "";
  if (randomType === "fire") {
    signal = "There's a fire! Send help immediately!";
  } else if (randomType === "medical emergency") {
    signal = "Medical assistance needed urgently.";
  } else if (randomType === "active shooter") {
    signal = "Active shooter situation! Lockdown!";
  } else if (randomType === "routine check") {
    signal = "Routine system check in progress.";
  } else {
    signal = "System test initiated.";
  }

  document.getElementById('signal-input').value = signal;
}

// Example usage: Generate a random signal every 5 seconds
//setInterval(generateRandomSignal, 5000);

//Advanced Feature: Regular Expression Validation
function validateSignal(signal) {
    const regex = /^[a-zA-Z0-9\s.,!?]+$/; // Allows alphanumeric characters, spaces, and common punctuation
    return regex.test(signal);
}

document.getElementById('check-button').addEventListener('click', function() {
    const signalInput = document.getElementById('signal-input').value;
    const resultArea = document.getElementById('result-area');

    if (!validateSignal(signalInput)) {
        resultArea.innerHTML = "Error: Invalid signal format.  Only alphanumeric characters, spaces, and common punctuation allowed.";
        return;
    }

    const isEmergency = detectEmergency(signalInput);
    resultArea.innerHTML = `Result: ${isEmergency ? 'Emergency Detected' : 'No Emergency'}`;
});

//More advanced feature:  Array of possible responses
const emergencyResponses = [
    "Dispatching emergency services.",
    "Initiating lockdown protocol.",
    "Alerting security personnel.",
    "Activating emergency broadcast system."
];

document.getElementById('check-button').addEventListener('click', function() {
    const signalInput = document.getElementById('signal-input').value;
    const resultArea = document.getElementById('result-area');
    const isEmergency = detectEmergency(signalInput);

    if (isEmergency) {
        const randomIndex = Math.floor(Math.random() * emergencyResponses.length);
        resultArea.innerHTML = `Result: Emergency Detected. ${emergencyResponses[randomIndex]}`;
    } else {
        resultArea.innerHTML = `Result: No Emergency`;
    }
});

//Complex Array Manipulation:  Filtering and Mapping
const signalKeywords = ["fire", "medical", "shooter", "help", "emergency"];

document.getElementById('check-button').addEventListener('click', function() {
    const signalInput = document.getElementById('signal-input').value;
    const resultArea = document.getElementById('result-area');

    const keywordMatches = signalKeywords.filter(keyword => signalInput.toLowerCase().includes(keyword));
    const mappedResults = keywordMatches.map(keyword => `Keyword found: ${keyword}`);

    if (keywordMatches.length > 0) {
        resultArea.innerHTML = `Keywords found: ${mappedResults.join(", ")}.  Potential Emergency.`;
    } else {
        resultArea.innerHTML = `Result: No Emergency`;
    }
});

</script>
