    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
    <script src="../../../../shared/js/mbrn_storage.js"></script>
</head>
<body>
    <div class="tool-card">
        <h1>Autonomous Tool</h1>
        <div id="input-area">
  <textarea id="task-data" placeholder="Enter task data in JSON format"></textarea>
  <button id="parse-button">Parse Tasks</button>
</div>

<div id="result-area"></div>

<script>
function parseTasks(taskDataString) {
  try {
    const tasks = JSON.parse(taskDataString);
    const taskDict = {};

    for (const task of tasks) {
      taskDict[task.id] = task;
    }

    return taskDict;
  } catch (error) {
    return { error: "Invalid JSON format" };
  }
}

document.getElementById('parse-button').addEventListener('click', function() {
  const taskData = document.getElementById('task-data').value;
  const resultArea = document.getElementById('result-area');

  const parsedResult = parseTasks(taskData);

  if (parsedResult.error) {
    resultArea.innerHTML = `<p style="color: red;">Error: ${parsedResult.error}</p>`;
  } else {
    resultArea.innerHTML = `<pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">${JSON.stringify(parsedResult, null, 2)}</pre>`;
  }
});

// Example usage with hardcoded data (for demonstration)
const hardcodedTaskData = `
[
    {"id": 1, "title": "Task One", "status": "To Do"},
    {"id": 2, "title": "Task Two", "status": "In Progress"},
    {"id": 3, "title": "Task Three", "status": "Done"}
]
`;

const parsedHardcodedTasks = parseTasks(hardcodedTaskData);
document.getElementById('result-area').innerHTML = `<p>Hardcoded Example:</p><pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">${JSON.stringify(parsedHardcodedTasks, null, 2)}</pre>`;

// Additional functionality: Filtering tasks by status
function filterTasksByStatus(tasks, status) {
    if (!tasks || typeof tasks !== 'object') {
        return { error: "Invalid tasks data" };
    }

    const filteredTasks = Object.entries(tasks)
        .filter(([taskId, task]) => task.status === status)
        .reduce((acc, [taskId, task]) => {
            acc[taskId] = task;
            return acc;
        }, {});

    return filteredTasks;
}

// Example of filtering tasks (can be integrated into the UI)
document.getElementById('parse-button').addEventListener('click', function() {
  const taskData = document.getElementById('task-data').value;
  const resultArea = document.getElementById('result-area');

  const parsedResult = parseTasks(taskData);

  if (parsedResult.error) {
    resultArea.innerHTML = `<p style="color: red;">Error: ${parsedResult.error}</p>`;
  } else {
    const filteredResult = filterTasksByStatus(parsedResult, "In Progress");
    resultArea.innerHTML = `<pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">${JSON.stringify(parsedResult, null, 2)}</pre><br><pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">Filtered (In Progress):${JSON.stringify(filteredResult, null, 2)}</pre>`;
  }
});

// More complex example: Calculating the average task ID
function calculateAverageTaskId(tasks) {
    if (!tasks || typeof tasks !== 'object') {
        return { error: "Invalid tasks data" };
    }

    const taskIds = Object.values(tasks).map(task => task.id);

    if (taskIds.length === 0) {
        return { average: 0 };
    }

    const sum = taskIds.reduce((acc, current) => acc + current, 0);
    const average = sum / taskIds.length;
    return { average: average };
}

// Example of calculating average task ID
document.getElementById('parse-button').addEventListener('click', function() {
  const taskData = document.getElementById('task-data').value;
  const resultArea = document.getElementById('result-area');

  const parsedResult = parseTasks(taskData);

  if (parsedResult.error) {
    resultArea.innerHTML = `<p style="color: red;">Error: ${parsedResult.error}</p>`;
  } else {
    const averageResult = calculateAverageTaskId(parsedResult);
    resultArea.innerHTML = `<pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">${JSON.stringify(parsedResult, null, 2)}</pre><br><pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">Average Task ID: ${JSON.stringify(averageResult, null, 2)}</pre>`;
  }
});

// Regular Expression Example: Validate JSON
function isValidJSON(jsonString) {
    try {
        JSON.parse(jsonString);
        return true;
    } catch (error) {
        return false;
    }
}

document.getElementById('parse-button').addEventListener('click', function() {
    const taskData = document.getElementById('task-data').value;
    const resultArea = document.getElementById('result-area');

    if (!isValidJSON(taskData)) {
        resultArea.innerHTML = `<p style="color: red;">Error: Invalid JSON format</p>`;
        return;
    }

    const parsedResult = parseTasks(taskData);

    if (parsedResult.error) {
        resultArea.innerHTML = `<p style="color: red;">Error: ${parsedResult.error}</p>`;
    } else {
        resultArea.innerHTML = `<pre style="background-color: #f0f0f0; padding: 10px; border: 1px solid #ccc; overflow: auto;">${JSON.stringify(parsedResult, null, 2)}</pre>`;
    }
});

</script>
