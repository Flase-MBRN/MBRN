<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screener Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Resume Screener Module</h1>
        <label for="resumes">Resumes (JSON):</label>
<textarea id="resumes" rows="5" cols="50">{"resume1.pdf": {"skills": ["Python", "Machine Learning"], "experience": 3}, "resume2.docx": {"skills": ["Java", "Data Structures"], "experience": 5}}</textarea>

<label for="job_description">Job Description (JSON):</label>
<textarea id="job_description" rows="5" cols="50">{"jd1.txt": {"required_skills": ["Python", "Machine Learning"], "years_exp": 3}}</textarea>

<button onclick="calculateScores()">Calculate Scores</button>

<div id="result-area"></div>

<script>
function calculateScores() {
  const resumesText = document.getElementById('resumes').value;
  const jobDescriptionText = document.getElementById('job_description').value;

  let resumes;
  let jobDescription;

  try {
    resumes = JSON.parse(resumesText);
  } catch (error) {
    document.getElementById('result-area').innerText = "Error parsing resumes JSON: " + error.message;
    return;
  }

  try {
    jobDescription = JSON.parse(jobDescriptionText);
  } catch (error) {
    document.getElementById('result-area').innerText = "Error parsing job description JSON: " + error.message;
    return;
  }

  function scoreResumes(resumes, jobDescription) {
    const scoreMap = {};

    for (const filename in resumes) {
      let score = 0;
      const content = resumes[filename];

      if (content && content.skills && jobDescription && jobDescription.required_skills) {
        for (const skill of jobDescription.required_skills) {
          if (content.skills.includes(skill)) {
            score++;
          }
        }
      }

      if (content && content.experience && jobDescription && jobDescription.years_exp) {
        if (content.experience >= jobDescription.years_exp) {
          score++;
        }
      }

      scoreMap[filename] = score;
    }

    return scoreMap;
  }

  const scores = scoreResumes(resumes, jobDescription);
  document.getElementById('result-area').innerText = "Scores: " + JSON.stringify(scores, null, 2);
}
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
