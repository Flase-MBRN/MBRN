        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }

        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }

        button:hover { background-color: #8C72F7; transform: translateY(-1px); }

<body>
    <div class="tool-card">
        <h1>Work Flow Agent Factory Module</h1>
        <div id="input-area">
  <label for="initialData">Initial Data (JSON):</label><br>
  <textarea id="initialData" rows="5" cols="50">{}</textarea><br><br>

  <button id="executeButton">Execute Pipeline</button>
</div>

<div id="result-area"></div>

<script>
const initialDataTextarea = document.getElementById('initialData');
const executeButton = document.getElementById('executeButton');
const resultArea = document.getElementById('result-area');

function leaderAgent(initialData) {
  // Placeholder for actual logic
  return { processed: 'data' };
}

function sampleAgent(data) {
  // Example agent
  return { output: 'processed' };
}

function executePipeline(initialDataString) {
  try {
    const initialData = JSON.parse(initialDataString);

    const pipeline = {
      memory: {},
      addStep: function(stepName, agent, dependsOn) {
        this.memory[stepName] = {
          agent: agent,
          dependsOn: dependsOn || []
        };
      },
      execute: function(startStep) {
        const queue = [startStep];
        while (queue.length > 0) {
          const currentStep = queue.shift();
          if (this.memory[currentStep]) {
            const dependencies = this.memory[currentStep].dependsOn;
            for (const dep of dependencies) {
              queue.push(dep);
            }
            const result = this.memory[currentStep].agent(this.memory.GlobalMemory.data || {});
            this.memory.GlobalMemory.data = result;
          } else {
            throw new Error(`Step '${currentStep}' does not have an agent assigned.`);
          }
        }
      }
    };

    pipeline.memory.GlobalMemory = { data: {} };

    pipeline.addStep('GlobalMemory', (x) => x);
    pipeline.addStep('Step1', sampleAgent);
    pipeline.addStep('Step2', leaderAgent);

    pipeline.execute('Step2');

    resultArea.innerHTML = `<pre>${JSON.stringify(pipeline.memory.GlobalMemory.data, null, 2)}</pre>`;

  } catch (error) {
    resultArea.innerHTML = `<pre>${error.message}</pre>`;
  }
}

executeButton.addEventListener('click', () => {
  const initialDataString = initialDataTextarea.value;
  executePipeline(initialDataString);
});
</script>
