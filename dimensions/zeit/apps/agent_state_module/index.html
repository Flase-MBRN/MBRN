<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent State Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Agent State Module</h1>
        <label for="agent_name">[PROTECTED]:</label>
<input type="text" id="agent_name" value="pro">
<button onclick="readAgentState()">Read State</button>

<label for="new_data">New Data (JSON):</label>
<textarea id="new_data">{"current_task": "new task"}</textarea>
<button onclick="writeAgentState()">Write State</button>

<button onclick="checkHeartbeat()">Check Heartbeat</button>

<div id="result-area"></div>

<script>
function readAgentState() {
    const agentName = document.getElementById('agent_name').value;
    const resultArea = document.getElementById('result-area');

    // Simulate reading from a JSON file (replace with actual file reading in a real environment)
    function simulateReadAgentState(agentName) {
        const agents = {
            "pro": {
                "heartbeat": Math.floor(Date.now() / 1000) // Simulate a recent heartbeat
            }
        };
        return agents[agentName] || {};
    }

    try {
        const state = simulateReadAgentState(agentName);
        resultArea.innerHTML = `<p>State of ${agentName} agent: <pre>${JSON.stringify(state, null, 2)}</pre></p>`;
    } catch (error) {
        resultArea.innerHTML = `<p>Error reading state: ${error.message}</p>`;
    }
}

function writeAgentState() {
    const agentName = document.getElementById('agent_name').value;
    const newDataString = document.getElementById('new_data').value;
    const resultArea = document.getElementById('result-area');

    try {
        const newData = JSON.parse(newDataString);

        // Simulate writing to a JSON file (replace with actual file writing in a real environment)
        function simulateWriteAgentState(agentName, newData) {
            // In a real implementation, this would write to a file.
            // For simulation, we just update a local object.
            if (!window.agentStates) {
                window.agentStates = {};
            }
            if (!window.agentStates[agentName]) {
                window.agentStates[agentName] = {};
            }
            window.agentStates[agentName] = { ...window.agentStates[agentName], ...newData };
            return window.agentStates[agentName];
        }

        const currentState = simulateReadAgentState(agentName);
        const updatedState = { ...currentState, ...newData };
        simulateWriteAgentState(agentName, newData);

        resultArea.innerHTML = `<p>State of ${agentName} agent updated: <pre>${JSON.stringify(updatedState, null, 2)}</pre></p>`;

    } catch (error) {
        resultArea.innerHTML = `<p>Error writing state: ${error.message}</p>`;
    }
}

function checkHeartbeat() {
    const agentName = document.getElementById('agent_name').value;
    const resultArea = document.getElementById('result-area');

    // Simulate reading the agent state
    function simulateReadAgentState(agentName) {
        const agents = {
            "pro": {
                "heartbeat": Math.floor(Date.now() / 1000) // Simulate a recent heartbeat
            }
        };
        return agents[agentName] || {};
    }

    try {
        const state = simulateReadAgentState(agentName);
        const lastHeartbeat = state.heartbeat || 0;
        const now = Math.floor(Date.now() / 1000);
        const gracePeriod = 60 * 5; // 5 minutes

        const isRecent = now - lastHeartbeat < gracePeriod;

        if (isRecent) {
            resultArea.innerHTML = `<p>Heartbeat check passed for ${agentName}. Last heartbeat: ${new Date(lastHeartbeat * 1000).toLocaleString()}</p>`;
        } else {
            resultArea.innerHTML = `<p>Heartbeat check failed for ${agentName}. Last heartbeat was too long ago: ${new Date(lastHeartbeat * 1000).toLocaleString()}</p>`;
        }
    } catch (error) {
        resultArea.innerHTML = `<p>Error checking heartbeat: ${error.message}</p>`;
    }
}
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
