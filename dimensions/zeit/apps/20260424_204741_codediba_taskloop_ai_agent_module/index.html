<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Loop Agent</title>
</head>
<body>
    <div class="tool-card">
        <h1>Task Loop Agent</h1>
        <p>Enter a task description and see the simulated execution.</p>

        <input type="text" id="taskInput" placeholder="Enter task description...">
        <button onclick="runTask()">Run Task</button>

        <div id="result">
            <!-- Result will be displayed here -->
        </div>
    </div>

    <script>
        function runTask() {
            const taskDescription = document.getElementById('taskInput').value;
            const resultDiv = document.getElementById('result');

            if (!taskDescription) {
                resultDiv.textContent = "Please enter a task description.";
                return;
            }

            // Simulate the Python logic using JavaScript
            resultDiv.textContent = "Executing task: " + taskDescription + "...";
            setTimeout(() => {
                resultDiv.textContent = "Executing task: " + taskDescription + "...\nSimulating execution time...";
                setTimeout(() => {
                    resultDiv.textContent = "Executing task: " + taskDescription + "...\nSimulating execution time...\nTask completed successfully!";
                    resultDiv.innerHTML += "<br>Output of task: " + taskDescription;
                    resultDiv.innerHTML += "<br>Evaluation: Task completed successfully";
                    resultDiv.innerHTML += "<br>Suggestion: Try a different approach";
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
