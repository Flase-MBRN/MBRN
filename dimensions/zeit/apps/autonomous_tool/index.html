<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Autonomous Tool | MBRN Hub</title>
    <script>
        window.MBRN_CONFIG = {
            supabaseUrl: 'https://wqfijgzlxypqftwwoxxp.supabase.co',
            supabaseKey: 'sb_publishable_2K9K_RcFJyO5VS2XYlAWag_qFJuKseO'
        };
    </script>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
    <script src="../../../../shared/js/mbrn_storage.js"></script>
</head>
<body>
    <div class="tool-card">
        <h1>Autonomous Tool</h1>
        <div id="input-area">
  <p>Enter ideas data (JSON format):</p>
  <textarea id="ideas-input" placeholder='[{"id": 1, "assumption": "Assumption A", "dependent_ideas": [2]}, {"id": 2, "assumption": "Assumption B", "dependent_ideas": [3]}, {"id": 3, "assumption": "Assumption C", "dependent_ideas": []}]'></textarea>
  <button id="process-button">Process Ideas</button>
</div>

<div id="result-area"></div>

<script>
function processIdeas(ideas) {
  const dependencyGraph = {};

  for (const idea of ideas) {
    const assumption = idea.assumption;
    if (idea.dependent_ideas && idea.dependent_ideas.length > 0) {
      for (const dep of idea.dependent_ideas) {
        if (!dependencyGraph[dep]) {
          dependencyGraph[dep] = [];
        }
        dependencyGraph[dep].push(assumption);
      }
    }
  }

  return dependencyGraph;
}

document.getElementById('process-button').addEventListener('click', () => {
  const ideasInput = document.getElementById('ideas-input').value;
  try {
    const ideas = JSON.parse(ideasInput);

    const dependencyGraph = processIdeas(ideas);

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<pre>${JSON.stringify(dependencyGraph, null, 4)}</pre>`;

    // Simulate MODULE_READY output
    const moduleReadyArea = document.createElement('p');
    moduleReadyArea.textContent = "MODULE_READY: velvetmonkey_flywheel_ideas";
    resultArea.appendChild(moduleReadyArea);

    // Example of using Math.random() for a time-related calculation
    const randomTimeOffset = Math.random() * 1000; // Random offset in milliseconds
    const now = new Date();
    const futureTime = new Date(now.getTime() + randomTimeOffset);
    const formattedTime = futureTime.toLocaleTimeString();

    const timeArea = document.createElement('p');
    timeArea.textContent = `Simulated Future Time: ${formattedTime}`;
    resultArea.appendChild(timeArea);

    // Example using RegExp to validate input
    const isValidJson = /^\s*\[(?:\{[^"\}\\]*(?:\\.[^"\}\\]*)*\}.*?)*\s*\]\s*$/.test(ideasInput);
    if (!isValidJson) {
        const errorArea = document.createElement('p');
        errorArea.textContent = "Error: Invalid JSON format. Please check your input.";
        errorArea.style.color = "red";
        resultArea.innerHTML = ""; // Clear previous results
        resultArea.appendChild(errorArea);
        return;
    }

    //Example using Array.filter
    const filteredIdeas = ideas.filter(idea => idea.id % 2 === 0);
    const filteredResultArea = document.createElement('p');
    filteredResultArea.textContent = `Filtered Ideas (even IDs): ${JSON.stringify(filteredIdeas)}`;
    resultArea.appendChild(filteredResultArea);

    //Example using Array.map
    const mappedIdeas = ideas.map(idea => ({...idea, processed: true}));
    const mappedResultArea = document.createElement('p');
    mappedResultArea.textContent = `Mapped Ideas (processed flag added): ${JSON.stringify(mappedIdeas)}`;
    resultArea.appendChild(mappedResultArea);

    //Example using Array.reduce
    const totalIdSum = ideas.reduce((sum, idea) => sum + idea.id, 0);
    const reduceResultArea = document.createElement('p');
    reduceResultArea.textContent = `Total ID Sum: ${totalIdSum}`;
    resultArea.appendChild(reduceResultArea);

    //Example using Array.sort
    const sortedIdeas = [...ideas].sort((a, b) => a.id - b.id);
    const sortResultArea = document.createElement('p');
    sortResultArea.textContent = `Sorted Ideas (by ID): ${JSON.stringify(sortedIdeas)}`;
    resultArea.appendChild(sortResultArea);

  } catch (error) {
    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<p style="color: red;">Error parsing JSON: ${error.message}</p>`;
  }
});
</script>
<!-- DIESES TOOL WURDE FÜR DIE DIMENSION 'ZEIT' OPTIMIERT. -->
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
