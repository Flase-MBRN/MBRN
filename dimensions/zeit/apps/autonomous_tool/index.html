    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }

<body>
    <div class="tool-card">
        <h1>Autonomous Tool</h1>
        <div id="input-area">
  <label for="location">Location:</label>
  <input type="text" id="location" value="Japan"><br><br>

  <label for="trip_duration">Trip Duration:</label>
  <input type="number" id="trip_duration" value="7"><br><br>

  <label for="interests">Interests (comma-separated):</label>
  <input type="text" id="interests" value="culture,nature"><br><br>

  <button onclick="recommend()">Recommend</button>
</div>

<div id="result-area"></div>

<script>
function recommend() {
  const location = document.getElementById('location').value;
  const tripDuration = parseInt(document.getElementById('trip_duration').value);
  const interests = document.getElementById('interests').value.split(',').map(interest => interest.trim());

  const sampleDestinations = [
    {"name": "Kyoto", "country": "Japan", "type": "culture"},
    {"name": "Hiroshima", "country": "Japan", "type": "history"},
    {"name": "Mount Fuji", "country": "Japan", "type": "nature"}
  ];

  function recommendDestinations(userPreferences, destinations) {
    let recommendedDestinations = [];
    for (const dest of destinations) {
      if (dest["country"] === userPreferences.location && recommendedDestinations.length < 2) {
        recommendedDestinations.push(dest);
      }
    }
    return recommendedDestinations;
  }

  const userPreferences = {
    "location": location,
    "trip_duration": tripDuration,
    "interests": interests
  };

  const recommended = recommendDestinations(userPreferences, sampleDestinations);

  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = `<pre>${JSON.stringify(recommended, null, 2)}</pre>`;
}

// Additional functionality:  Dynamic filtering based on interests
function filterDestinations(destinations, interests) {
    return destinations.filter(dest => interests.some(interest => dest.type === interest));
}

// Example usage of filterDestinations (not directly used in the core recommendation, but demonstrates advanced JS)
function recommendWithInterestFilter() {
    const location = document.getElementById('location').value;
    const tripDuration = parseInt(document.getElementById('trip_duration').value);
    const interests = document.getElementById('interests').value.split(',').map(interest => interest.trim());

    const sampleDestinations = [
        {"name": "Kyoto", "country": "Japan", "type": "culture"},
        {"name": "Hiroshima", "country": "Japan", "type": "history"},
        {"name": "Mount Fuji", "country": "Japan", "type": "nature"},
        {"name": "Osaka", "country": "Japan", "type": "culture"}
    ];

    const filteredDestinations = filterDestinations(sampleDestinations, interests);

    function recommendDestinationsFiltered(userPreferences, destinations) {
        let recommendedDestinations = [];
        for (const dest of destinations) {
            if (dest["country"] === userPreferences.location && recommendedDestinations.length < 2) {
                recommendedDestinations.push(dest);
            }
        }
        return recommendedDestinations;
    }

    const userPreferences = {
        "location": location,
        "trip_duration": tripDuration,
        "interests": interests
    };

    const recommended = recommendDestinationsFiltered(userPreferences, filteredDestinations);

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<pre>${JSON.stringify(recommended, null, 2)}</pre>`;
}

// Regular Expression Example (for validating input - not currently used, but demonstrates JS capabilities)
function validateInput() {
    const interests = document.getElementById('interests').value;
    const regex = /^[a-zA-Z, ]+$/; // Allows letters, commas, and spaces
    if (!regex.test(interests)) {
        alert("Invalid characters in interests. Only letters, commas, and spaces are allowed.");
    }
}

// Math.random() example (for generating random recommendations - not used in core logic, but demonstrates JS)
function randomRecommendation() {
    const sampleDestinations = [
        {"name": "Kyoto", "country": "Japan", "type": "culture"},
        {"name": "Hiroshima", "country": "Japan", "type": "history"},
        {"name": "Mount Fuji", "country": "Japan", "type": "nature"}
    ];

    const randomIndex = Math.floor(Math.random() * sampleDestinations.length);
    const randomDestination = sampleDestinations[randomIndex];

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<pre>${JSON.stringify(randomDestination, null, 2)}</pre>`;
}

//Array.sort() example
function sortDestinations(){
    const sampleDestinations = [
        {"name": "Kyoto", "country": "Japan", "type": "culture"},
        {"name": "Hiroshima", "country": "Japan", "type": "history"},
        {"name": "Mount Fuji", "country": "Japan", "type": "nature"}
    ];

    const sortedDestinations = sampleDestinations.sort((a, b) => a.name.localeCompare(b.name));

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<pre>${JSON.stringify(sortedDestinations, null, 2)}</pre>`;
}

</script>
