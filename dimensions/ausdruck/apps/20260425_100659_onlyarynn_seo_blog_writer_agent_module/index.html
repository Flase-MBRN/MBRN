        <div id="input-area">
  <textarea id="markdown-content" placeholder="Enter Markdown Content"></textarea>
  <button id="extract-button">Extract Functions</button>
</div>

<div id="result-area"></div>

<script>
const extractCoreAutonomousFunction = (markdownContent) => {
  const functions = [];
  if (markdownContent) {
    const pattern = /\*\*Function:\*\*(.*?)\n/g;
    let match;
    while ((match = pattern.exec(markdownContent)) !== null) {
      functions.push(match[1].trim());
    }
  }
  return functions;
};

document.getElementById('extract-button').addEventListener('click', () => {
  const markdownContent = document.getElementById('markdown-content').value;
  const extractedFunctions = extractCoreAutonomousFunction(markdownContent);
  const resultArea = document.getElementById('result-area');

  resultArea.innerHTML = '<h3>Extracted Functions:</h3>';
  if (extractedFunctions.length > 0) {
    const ul = document.createElement('ul');
    extractedFunctions.forEach(functionName => {
      const li = document.createElement('li');
      li.textContent = functionName;
      ul.appendChild(li);
    });
    resultArea.appendChild(ul);
  } else {
    resultArea.textContent = 'No functions found.';
  }
});
