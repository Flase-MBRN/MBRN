<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookly Assistant - Postcode Extractor</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            width: 100%;
            text-align: center;
        }

        .module-info {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Postcode Extractor</h1>

    <textarea id="inputText" placeholder="Enter text to extract postcode from..."></textarea>

    <button onclick="extractPostcode()">Extract Postcode</button>

    <div id="result"></div>

    <div class="module-info">
        <p><b>MBRN Factory-Ready Module</b></p>
        <p>Source Alpha: djememahamat/bookly_assistant</p>
        <p>Alpha ID: raw_djememahamat_bookly_assistant</p>
        <p>ROI Score: 80.5</p>
        <p>Manufactured At: 2026-04-25T08:03:18.662584+00:00</p>
        <p>Agent Attempts: 1</p>
    </div>

    <script>
        function extractPostcode() {
            const inputText = document.getElementById('inputText').value;
            const resultDiv = document.getElementById('result');

            const pattern = /\b[A-Za-z]{1}\d{1}[A-Za-z]\s?\d{1}[A-Za-z]{1}\b/;
            const match = inputText.match(pattern);

            let postcode = match ? match[0] : "No postcode found.";

            resultDiv.textContent = postcode;
        }
    </script>
</body>
</html>
