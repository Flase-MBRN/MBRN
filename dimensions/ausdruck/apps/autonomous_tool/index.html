<script>
function analyzeCode(code, language) {
  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = 'Analyzing... Please wait.';

  // Simulate Python analyze_code function in JavaScript
  let syntaxCheck = {
    valid: code.length > 10,
    errors: code.length <= 10 ? ["Syntax error at line 1"] : []
  };

  let analysis = {
    language: language,
    issues: [
      { type: "performance", description: "Code could be optimized" },
      { type: "readability", description: "Consider refactoring for clarity" }
    ]
  };

  let result;

  if (language === 'python') {
    result = {
      status: "success",
      syntax_check: syntaxCheck,
      analysis: analysis
    };
  } else {
    result = {
      status: "success",
      syntax_check: syntaxCheck,
      analysis: analysis
    };
  }

  const jsonResult = JSON.stringify(result, null, 4);
  resultArea.innerHTML = `<pre>${jsonResult}</pre>`;
}


document.getElementById('analyze-button').addEventListener('click', function() {
  const code = document.getElementById('code-input').value;
  const language = document.getElementById('language-select').value;
  analyzeCode(code, language);
});

// Additional functionality (Regex, Math.random, Array methods)
function generateRandomCode(length) {
  const characters = 'abcdefghijklmnopqrstuvwxyz0123456789 ';
  let result = '';
  const charactersLength = characters.length;
  for (let i = 0; i < length; i++) {
    result += characters.charAt(Math.floor(Math.random() * charactersLength));
  }
  return result;
}

function regexExample(inputString) {
  const regex = /^[a-zA-Z0-9]+$/;
  return regex.test(inputString);
}

function arrayFilterExample(numbers) {
  return numbers.filter(number => number > 5);
}

function arrayMapExample(numbers) {
  return numbers.map(number => number * 2);
}

function arrayReduceExample(numbers) {
  return numbers.reduce((sum, number) => sum + number, 0);
}

function arraySortExample(numbers) {
  return numbers.sort((a, b) => a - b);
}
