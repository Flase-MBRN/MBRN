    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }

        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }

        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Hivemind Module</h1>
        <div id="input-area">
  <label for="tasks-input">Tasks (JSON):</label>
  <textarea id="tasks-input" placeholder='[{"name": "A", "duration": 3, "dependencies": []}, {"name": "B", "duration": 2, "dependencies": ["A"]}, {"name": "C", "duration": 4, "dependencies": ["A"]}, {"name": "D", "duration": 1, "dependencies": ["B", "C"]}]'></textarea>
  <button id="calculate-button">Calculate Critical Path</button>
</div>

<div id="result-area"></div>

<script src="../../../../shared/js/mbrn_storage.js"></script>
<script>
const tasksInput = document.getElementById('tasks-input');
const calculateButton = document.getElementById('calculate-button');
const resultArea = document.getElementById('result-area');

function findCriticalPath(tasks) {
    const graph = {};
    for (const task of tasks) {
        const name = task.name;
        graph[name] = {
            duration: task.duration,
            dependencies: task.dependencies || [],
            early_start: 0,
            early_finish: 0,
            late_start: Infinity,
            late_finish: Infinity
        };
    }

    for (const node in graph) {
        if (graph[node].dependencies.length === 0) {
            graph[node].early_start = 0;
        } else {
            const maxPredecessorEarlyFinish = graph[node].dependencies.reduce((max, pred) => Math.max(max, graph[pred].early_finish), 0);
            graph[node].early_start = maxPredecessorEarlyFinish;
        }
        graph[node].early_finish = graph[node].early_start + graph[node].duration;
    }

    for (const node in Object.keys(graph).reverse()) {
        const nodeName = Object.keys(graph)[node];
        if (graph[nodeName].dependencies.length === 0) {
            graph[nodeName].late_finish = graph[nodeName].early_finish;
        } else {
            const minSuccessorLateStart = graph[nodeName].dependencies.reduce((min, succ) => Math.min(min, graph[succ].late_start), Infinity);
            graph[nodeName].late_finish = minSuccessorLateStart - graph[nodeName].duration;
        }
        graph[nodeName].late_start = graph[nodeName].late_finish - graph[nodeName].duration;
    }

    const criticalPath = [];
    for (const node in graph) {
        if (graph[node].early_start === graph[node].late_start) {
            criticalPath.push(node);
        }
    }

    return criticalPath;
}

calculateButton.addEventListener('click', () => {
  try {
    const tasks = JSON.parse(tasksInput.value);
    const result = findCriticalPath(tasks);
    resultArea.innerHTML = `<p>Critical Path: ${JSON.stringify(result)}</p>`;
  } catch (error) {
    resultArea.innerHTML = `<p>Error: Invalid JSON format. Please check your input.</p>`;
    console.error(error);
  }
});
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
