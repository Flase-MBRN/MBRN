<script>
function createSupervisorAgent(supervisorModel, supervisorProvider, specialists, supervisorPrompt) {
  let result = "Creating supervisor agent with prompt: " + supervisorPrompt + "<br>";
  for (let i = 0; i < specialists.length; i++) {
    const spec = specialists[i];
    result += "Specialist " + spec.name + " created with prompt: '" + spec.prompt + "' using model: " + spec.model + "<br>";
  }
  document.getElementById("result-area").innerHTML = result;
}

function getModel(model, provider) {
  return { model: model, provider: provider };
}

  const specialistPrompt = document.getElementById("specialistPrompt").value;
  const specialistModel = document.getElementById("specialistModel").value;
  const specialistProvider = document.getElementById("specialistProvider").value;
  const supervisorPrompt = document.getElementById("supervisorPrompt").value;

  const workerModelSpec = getModel(workerModel, workerProvider);

  const specialist = {
    name: specialistName,
    prompt: specialistPrompt,
    model: specialistModel
  };

  const specialists = [specialist];

  const supervisor = getModel(supervisorModel, supervisorProvider);

  createSupervisorAgent(supervisor, specialists, supervisorPrompt);
});
</script>
