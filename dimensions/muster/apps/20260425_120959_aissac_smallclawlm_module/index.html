<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 120959 Aissac Smallclawlm Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 120959 Aissac Smallclawlm Module</h1>
        <label for="specialty-input">Enter Specialty:</label>
<input type="text" id="specialty-input" name="specialty-input">
<button id="create-agent-button">Create Agent</button>
<br><br>
<label for="query-input">Enter Query:</label>
<input type="text" id="query-input" name="query-input">
<button id="run-agent-button">Run Agent</button>
<br><br>
<div id="result-area"></div>

<script>
const createAgentButton = document.getElementById('create-agent-button');
const runAgentButton = document.getElementById('run-agent-button');
const specialtyInput = document.getElementById('specialty-input');
const queryInput = document.getElementById('query-input');
const resultArea = document.getElementById('result-area');

function createNLMAgent(notebookId, tools) {
    return {
        notebook: { id: notebookId, tools: tools },
        tools: tools,
        run: function(query) {
            if (this.notebook.id === "abc123" && this.tools.includes("podcast")) {
                return `Generating podcast about ${query}`;
            } else if (this.notebook.id === "def456" && this.tools.includes("quiz")) {
                return `Creating quiz on ${query}`;
            } else {
                return "Unsupported task or notebook.";
            }
        }
    };
}

function createAgent(specialty) {
    const specialties = {
        "research": { id: "abc123", tools: ["deep_research", "ask_notebook", "add_source", "list_sources"] },
        "podcast": { id: "abc123", tools: ["ask_notebook", "add_source", "generate_podcast"] },
        "quiz": { id: "def456", tools: ["ask_notebook", "add_source", "generate_quiz"] },
        "report": { id: "ghi789", tools: ["ask_notebook", "add_source", "generate_report"] }
    };

    if (specialties[specialty]) {
        return createNLMAgent(specialties[specialty].id, specialties[specialty].tools);
    } else {
        throw new Error("Unsupported specialty");
    }
}

createAgentButton.addEventListener('click', function() {
    const specialty = specialtyInput.value;
    try {
        const agent = createAgent(specialty);
        resultArea.innerHTML = `Agent created with specialty: ${specialty}`;
    } catch (error) {
        resultArea.innerHTML = `Error: ${error.message}`;
    }
});

runAgentButton.addEventListener('click', function() {
    const specialty = specialtyInput.value;
    const query = queryInput.value;

    try {
        const agent = createAgent(specialty);
        const result = agent.run(query);
        resultArea.innerHTML = `<p>Result: ${result}</p>`;
    } catch (error) {
        resultArea.innerHTML = `<p>Error: ${error.message}</p>`;
    }
});
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
