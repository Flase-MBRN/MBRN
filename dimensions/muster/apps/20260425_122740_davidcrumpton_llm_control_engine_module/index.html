<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 122740 Davidcrumpton Llm Control Engine Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 122740 Davidcrumpton Llm Control Engine Module</h1>
        <div id="input-area">
  <label for="supervisor-model-model">Supervisor Model:</label>
  <input type="text" id="supervisor-model-model" value="claude-opus-4-7"><br>

  <label for="supervisor-model-provider">Supervisor Provider:</label>
  <input type="text" id="supervisor-model-provider" value="anthropic"><br>

  <label for="specialist-0-name">Specialist 0 Name:</label>
  <input type="text" id="specialist-0-name" value="researcher"><br>

  <label for="specialist-0-prompt">Specialist 0 Prompt:</label>
  <input type="text" id="specialist-0-prompt" value="You gather facts."><br>

  <label for="specialist-0-model-model">Specialist 0 Model Model:</label>
  <input type="text" id="specialist-0-model-model" value="claude-haiku-4-5"><br>

  <label for="specialist-0-model-provider">Specialist 0 Model Provider:</label>
  <input type="text" id="specialist-0-model-provider" value="anthropic"><br>

  <label for="specialist-1-name">Specialist 1 Name:</label>
  <input type="text" id="specialist-1-name" value="summariser"><br>

  <label for="specialist-1-prompt">Specialist 1 Prompt:</label>
  <input type="text" id="specialist-1-prompt" value="You produce concise summaries."><br>

  <label for="specialist-1-model-model">Specialist 1 Model Model:</label>
  <input type="text" id="specialist-1-model-model" value="claude-haiku-4-5"><br>

  <label for="specialist-1-model-provider">Specialist 1 Model Provider:</label>
  <input type="text" id="specialist-1-model-provider" value="anthropic"><br>

  <button id="generate-button">Generate</button>
</div>

<div id="result-area"></div>

<script>
  document.getElementById('generate-button').addEventListener('click', () => {
    const supervisorModelModel = document.getElementById('supervisor-model-model').value;
    const supervisorModelProvider = document.getElementById('supervisor-model-provider').value;
    const specialist0Name = document.getElementById('specialist-0-name').value;
    const specialist0Prompt = document.getElementById('specialist-0-prompt').value;
    const specialist0ModelModel = document.getElementById('specialist-0-model-model').value;
    const specialist0ModelProvider = document.getElementById('specialist-0-model-provider').value;
    const specialist1Name = document.getElementById('specialist-1-name').value;
    const specialist1Prompt = document.getElementById('specialist-1-prompt').value;
    const specialist1ModelModel = document.getElementById('specialist-1-model-model').value;
    const specialist1ModelProvider = document.getElementById('specialist-1-model-provider').value;

    const supervisor = {
      model: supervisorModelModel,
      provider: supervisorModelProvider
    };

    const workerModel = {
      model: specialist0ModelModel,
      provider: specialist0ModelProvider
    };

    const specialists = [
      {
        name: specialist0Name,
        prompt: specialist0Prompt,
        model: {
          model: specialist0ModelModel,
          provider: specialist0ModelProvider
        }
      },
      {
        name: specialist1Name,
        prompt: specialist1Prompt,
        model: {
          model: specialist1ModelModel,
          provider: specialist1ModelProvider
        }
      }
    ];

    const config = {
      'supervisor_model': supervisor,
      'specialists': specialists
    };

    const resultArea = document.getElementById('result-area');
    resultArea.innerHTML = `<pre>${JSON.stringify(config, null, 4)}</pre>`;
  });
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
