<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 154455 Kjm1559 Gitflow Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 154455 Kjm1559 Gitflow Module</h1>
        <div id="input-area">
  <label for="status">Status:</label><br>
  <textarea id="status" rows="4" cols="50">On branch main
Your branch is ahead of 'origin/main' by 2 commits.
Changes to be committed:
  (use "git restore --staged <file>..." to unstage)
        modified:   file1.txt
        new file:   file2.txt

Changes not staged for commit:
  (use "git add <file>..." to update what will be committed)
  (use "git restore <file>..." to discard changes in working directory)
        modified:   file3.txt

Untracked files:
  (use "git add <file>..." to include in what will be committed)
        file4.txt
</textarea><br><br>

  <label for="log">Log:</label><br>
  <textarea id="log" rows="4" cols="50">e123456 Feature A
f789012 Bug fix B
g345678 Feature C
h901234 Release prep</textarea><br><br>

  <label for="remote_tracking">Remote Tracking (JSON):</label><br>
  <textarea id="remote_tracking">{"origin/main": true, "origin/featureA": false, "origin/bugfixB": false}</textarea><br><br>

  <button id="diagnose-button">Diagnose Branch Health</button>
  <button id="resolve-button">Resolve Tangle</button>
</div>

<div id="result-area"></div>

<script>
  function diagnose_branch_health(status, log, remote_tracking) {
    if ("detached HEAD" in status) {
      return "Detached HEAD detected, potential rebase issue.";
    } else if (Array.from(remote_tracking).some(key => log.includes(key.slice(key.indexOf('/') + 1)))) {
      return "Orphaned branches or incomplete rebase detected.";
    } else {
      return "Branch is healthy.";
    }
  }

  function resolve_tangle(status, log, remote_tracking) {
    if ("detached HEAD" in status) {
      return "Automatically reattach to a branch.";
    } else if (Array.from(remote_tracking).some(key => log.includes(key.slice(key.indexOf('/') + 1)))) {
      return "Automate conflict resolution and continue the merge/rebase process.";
    } else {
      return "No tangles detected, all clear.";
    }
  }

  document.getElementById("diagnose-button").addEventListener("click", function() {
    const status = document.getElementById("status").value;
    const log = document.getElementById("log").value;
    const remoteTrackingString = document.getElementById("remote_tracking").value;
    const remoteTracking = JSON.parse(remoteTrackingString);

    const diagnosis = diagnose_branch_health(status, log, remoteTracking);
    document.getElementById("result-area").innerHTML += "<p><b>Diagnosis:</b> " + diagnosis + "</p>";
  });

  document.getElementById("resolve-button").addEventListener("click", function() {
    const status = document.getElementById("status").value;
    const log = document.getElementById("log").value;
    const remoteTrackingString = document.getElementById("remote_tracking").value;
    const remoteTracking = JSON.parse(remoteTrackingString);

    const resolution = resolve_tangle(status, log, remoteTracking);
    document.getElementById("result-area").innerHTML += "<p><b>Resolution:</b> " + resolution + "</p>";
  });
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
