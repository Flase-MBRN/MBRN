<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBRN Agent Team Module</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .module-data {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .module-data p {
            margin: 5px 0;
        }

        .input-container {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="number"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        #result {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>MBRN Agent Team Module</h1>

    <div class="module-data">
        <p><strong>Source Alpha:</strong> joshuasaunders/agent-team</p>
        <p><strong>Alpha ID:</strong> raw_joshuasaunders_agent-team</p>
        <p><strong>ROI Score:</strong> 80.0</p>
        <p><strong>Manufactured At:</strong> 2026-04-24T21:44:29.441538+00:00</p>
        <p><strong>Agent Attempts:</strong> 1</p>
    </div>

    <div class="input-container">
        <label for="revenue">Revenue:</label>
        <input type="number" id="revenue" value="800">
    </div>

    <div class="input-container">
        <label for="costs">Costs:</label>
        <input type="number" id="costs" value="400">
    </div>

    <button onclick="calculateROI()">Calculate ROI</button>

    <div id="result"></div>

    <script>
        function calculateROI() {
            const revenue = parseFloat(document.getElementById('revenue').value);
            const costs = parseFloat(document.getElementById('costs').value);
            let roi;

            if (costs === 0) {
                roi = Infinity;
            } else {
                roi = ((revenue - costs) / costs) * 100;
            }

            roi = Math.round(roi, 1);

            document.getElementById('result').innerText = `ROI: ${roi}%`;
        }
    </script>

</body>
</html>
