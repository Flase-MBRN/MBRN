        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }

    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 142407 Raulvallejo Stackpulse Module</h1>
        <div id="config-area"></div>
<div id="result-area"></div>

<script>
  function loadConfig() {
    const config = {
      "orchestrator": {
        "dispatch": {
          "send_api": "https://api.langgraph.com/send",
          "tools": ["Anthropic", "Groq", "OPIK", "LangChain", "LangGraph", "Pinecone", "Tavily", "MCP Protocol"]
        }
      },
      "sources_monitored": {
        "Anthropic": {"source": "RSS / GitHub Releases / changelog scraping"},
        "Groq": {"source": "RSS / GitHub Releases / changelog scraping"},
        "OPIK": {"source": "RSS / GitHub Releases / changelog scraping"},
        "LangChain": {"source": "RSS / GitHub Releases / changelog scraping"},
        "LangGraph": {"source": "RSS / GitHub Releases / changelog scraping"},
        "Pinecone": {"source": "RSS / GitHub Releases / changelog scraping"},
        "Tavily": {"source": "RSS / GitHub Releases / changelog scraping"},
        "MCP Protocol": {"source": "RSS / GitHub Releases / changelog scraping"}
      }
    };
    return config;
  }

  function displayConfig(config) {
    const configArea = document.getElementById('config-area');
    configArea.innerHTML = '<pre>' + JSON.stringify(config, null, 2) + '</pre>';
  }

  function selfTest() {
    const config = loadConfig();
    displayConfig(config);

    // Basic assertions (for demonstration - could be more robust)
    if (typeof config !== 'object' || config === null) {
      document.getElementById('result-area').innerHTML = "Error: Config is not a dictionary.";
      return;
    }

    if (config.orchestrator && config.orchestrator.dispatch && config.orchestrator.dispatch.tools) {
      if (config.orchestrator.dispatch.tools.length !== 8) {
        document.getElementById('result-area').innerHTML = "Error: Expected 8 tools in dispatch.";
        return;
      }
    }

    document.getElementById('result-area').innerHTML = "MODULE_READY: raulvallejo_stackpulse";
  }

  // Initial execution
  selfTest();

</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
