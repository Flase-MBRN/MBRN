<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Agent Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Chronos Agent Module</h1>
        <div id="input-area">
  <label for="node">Node:</label>
  <input type="text" id="node" name="node"><br><br>

  <label for="prompt">Prompt:</label>
  <input type="text" id="prompt" name="prompt"><br><br>

  <label for="tool">Tool:</label>
  <input type="text" id="tool" name="tool"><br><br>

  <label for="state">State:</label>
  <input type="text" id="state" name="state"><br><br>

  <button id="record-button">Record Run</button><br><br>

  <label for="run_id">Run ID to Fork:</label>
  <input type="number" id="run_id" name="run_id"><br><br>

  <label for="fork_tool">Tool Call Change (for fork):</label>
  <input type="text" id="fork_tool" name="fork_tool"><br><br>

  <button id="fork-button">Fork Run</button><br><br>

  <label for="compare_run1">Run ID 1 for Comparison:</label>
  <input type="number" id="compare_run1" name="compare_run1"><br><br>

  <label for="compare_run2">Run ID 2 for Comparison:</label>
  <input type="number" id="compare_run2" name="compare_run2"><br><br>

  <button id="compare-button">Compare Runs</button><br><br>

  <label for="diff_run1">Run ID 1 for Diff:</label>
  <input type="number" id="diff_run1" name="diff_run1"><br><br>

  <label for="diff_run2">Run ID 2 for Diff:</label>
  <input type="number" id="diff_run2" name="diff_run2"><br><br>

  <button id="diff-button">Diff Runs</button>
</div>

<div id="result-area"></div>

<script>
const runs = {};
let runCount = 0;

function recordRun(node, prompt, tool, state) {
  runCount++;
  runs[runCount] = {
    node: node,
    prompt: prompt,
    tool_call: { tool: tool },
    state_transition: { state: state },
  };
  displayResult("Run recorded with ID: " + runCount);
}

function forkRun(runId, toolChange) {
  const originalRun = runs[runId];
  if (!originalRun) {
    displayResult("Run ID not found.");
    return;
  }

  const newRun = { ...originalRun };
  newRun.tool_call = { ...newRun.tool_call, ...{ tool: toolChange } };
  runCount++;
  runs[runCount] = newRun;
  displayResult("Run forked with ID: " + runCount);
}

function compareRuns(run1, run2) {
  const run1Data = runs[run1];
  const run2Data = runs[run2];

  if (!run1Data || !run2Data) {
    displayResult("One or both Run IDs not found.");
    return;
  }

  let comparisonOutput = "Comparison:\n";
  for (const key of ["node", "prompt", "tool_call", "state_transition"]) {
    comparisonOutput += `  ${key}:\n`;
    comparisonOutput += `    Run 1: ${JSON.stringify(run1Data[key])}\n`;
    comparisonOutput += `    Run 2: ${JSON.stringify(run2Data[key])}\n`;
  }
  displayResult(comparisonOutput);
}

function diffRuns(run1, run2) {
  const run1Data = runs[run1];
  const run2Data = runs[run2];

  if (!run1Data || !run2Data) {
    displayResult("One or both Run IDs not found.");
    return;
  }

  let diffOutput = "Differences:\n";
  for (const key of ["node", "prompt", "tool_call", "state_transition"]) {
    if (run1Data[key] !== run2Data[key]) {
      diffOutput += `  ${key}:\n`;
      const diffDict = {};
      diffDict[key] = run1Data[key];
      diffDict[`${key}_new`] = run2Data[key];

      for (const k in diffDict) {
        diffOutput += `    ${k}: ${JSON.stringify(diffDict[k])}\n`;
      }
    }
  }
  displayResult(diffOutput);
}

function displayResult(result) {
  document.getElementById("result-area").innerHTML += "<p>" + result + "</p>";
}

document.getElementById("record-button").addEventListener("click", () => {
  const node = document.getElementById("node").value;
  const prompt = document.getElementById("prompt").value;
  const tool = document.getElementById("tool").value;
  const state = document.getElementById("state").value;
  recordRun(node, prompt, tool, state);
});

document.getElementById("fork-button").addEventListener("click", () => {
  const runId = parseInt(document.getElementById("run_id").value);
  const toolChange = document.getElementById("fork_tool").value;
  forkRun(runId, toolChange);
});

document.getElementById("compare-button").addEventListener("click", () => {
  const run1 = parseInt(document.getElementById("compare_run1").value);
  const run2 = parseInt(document.getElementById("compare_run2").value);
  compareRuns(run1, run2);
});

document.getElementById("diff-button").addEventListener("click", () => {
  const run1 = parseInt(document.getElementById("diff_run1").value);
  const run2 = parseInt(document.getElementById("diff_run2").value);
  diffRuns(run1, run2);
});
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
