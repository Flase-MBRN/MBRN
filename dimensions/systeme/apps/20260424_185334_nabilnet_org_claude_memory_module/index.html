<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Memory Module</title>
</head>
<body>
    <div class="tool-card">
        <h1>Claude Memory Module</h1>
        <p>Enter a text to be chunked into smaller parts.</p>
        <textarea id="inputText" rows="5" placeholder="Enter text here..."></textarea>
        <label for="maxTokens">Max Tokens per Chunk:</label>
        <input type="number" id="maxTokens" value="100" min="10">
        <button onclick="processText()">Chunk Text</button>
        <div id="result"></div>
    </div>

    <script>
        function processText() {
            const inputText = document.getElementById('inputText').value;
            const maxTokens = parseInt(document.getElementById('maxTokens').value);

            if (!inputText) {
                document.getElementById('result').innerText = "Please enter some text.";
                return;
            }

            if (isNaN(maxTokens) || maxTokens <= 0) {
                document.getElementById('result').innerText = "Please enter a valid number of tokens.";
                return;
            }

            // Simulate the Python chunk_text function
            const words = inputText.split(/\s+/);
            const chunks = [];
            let currentChunk = [];

            for (const word of words) {
                const chunkString = ' '.join(currentChunk + [word]);
                if (chunkString.length <= maxTokens) {
                    currentChunk.push(word);
                } else {
                    chunks.push(chunkString);
                    currentChunk = [word];
                }
            }

            if (currentChunk.length > 0) {
                chunks.push(' '.join(currentChunk));
            }

            let resultText = "Chunks:\n";
            for (let i = 0; i < chunks.length; i++) {
                resultText += `Chunk ${i + 1}: ${chunks[i]}\n`;
            }

            document.getElementById('result').innerText = resultText;
        }
    </script>
</body>
</html>
