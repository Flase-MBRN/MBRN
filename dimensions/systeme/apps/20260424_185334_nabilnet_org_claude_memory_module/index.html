    <script>
        // Simulate file reading and chunking (replace with actual file processing)
        function simulateFileProcessing() {
            const fileContent = `
This is a sample file content. It's designed to demonstrate the chunking functionality.
The text will be split into smaller chunks based on the maximum token limit.
This allows for easier processing and display of large text files.
This is another sentence to add more content.
And yet another sentence to make the file longer.
This is the final sentence for this sample file.
`;

            const maxTokens = 100;
            const chunks = chunkText(fileContent, maxTokens);

            const chunkList = document.getElementById('chunk-list');

            chunks.forEach((chunk, index) => {
                const listItem = document.createElement('li');
                const pre = document.createElement('pre');
                pre.textContent = chunk;
                listItem.appendChild(pre);
                chunkList.appendChild(listItem);
            });
        }

        function chunkText(text, maxTokens) {
            const words = text.split(/\s+/);
            const chunks = [];
            let currentChunk = [];

            for (const word of words) {
                if (currentChunk.length === 0) {
                    currentChunk.push(word);
                } else {
                    const combinedText = currentChunk.join(' ') + ' ' + word;
                    if (combinedText.length <= maxTokens) {
                        currentChunk.push(word);
                    } else {
                        chunks.push(currentChunk.join(' '));
                        currentChunk = [word];
                    }
                }
            }

            if (currentChunk.length > 0) {
                chunks.push(currentChunk.join(' '));
            }

            return chunks;
        }

        document.addEventListener('DOMContentLoaded', () => {
            simulateFileProcessing();
        });
    </script>
