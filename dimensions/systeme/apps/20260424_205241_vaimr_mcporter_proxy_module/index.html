<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBRN Factory-Ready Module</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
        }

        p {
            margin-bottom: 10px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .data-label {
            width: 30%;
            font-weight: bold;
            color: #555;
        }

        .data-value {
            width: 65%;
            color: #777;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
        }

        #result p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MBRN Factory-Ready Module</h1>

        <div class="data-row">
            <div class="data-label">Source Alpha</div>
            <div class="data-value">vaimr/mcporter-proxy</div>
        </div>
        <div class="data-row">
            <div class="data-label">Alpha ID</div>
            <div class="data-value">alpha_1217922333</div>
        </div>
        <div class="data-row">
            <div class="data-label">ROI Score</div>
            <div class="data-value">85.0</div>
        </div>
        <div class="data-row">
            <div class="data-label">Manufactured At</div>
            <div class="data-value">2026-04-24T20:52:41.323031+00:00</div>
        </div>
        <div class="data-row">
            <div class="data-label">Agent Attempts</div>
            <div class="data-value">1</div>
        </div>

        <div id="result">
            <h2>Agent Information Extraction</h2>
            <p id="agent_id">Agent ID: Loading...</p>
            <p id="agent_key">Agent Key: Loading...</p>
        </div>
    </div>

    <script>
        function extractAgentInfo(authKey) {
            if (authKey.includes('-')) {
                separator = '-';
            } else if (authKey.includes('/')) {
                separator = '/';
            } else {
                throw new Error("Invalid authorization key format");
            }

            const parts = authKey.split(separator);
            if (parts.length !== 2) {
                throw new Error("Invalid authorization key format");
            }

            return {
                agentId: parts[0],
                agentKey: parts[1]
            };
        }

        const authKey = "agent123-secretkey";

        try {
            const agentInfo = extractAgentInfo(authKey);
            document.getElementById('agent_id').textContent = `Agent ID: ${agentInfo.agentId}`;
            document.getElementById('agent_key').textContent = `Agent Key: ${agentInfo.agentKey}`;
        } catch (error) {
            document.getElementById('agent_id').textContent = `Error: ${error.message}`;
            document.getElementById('agent_key').textContent = '';
        }

        console.log("MODULE_READY: vaimr_mcporter_proxy");
    </script>
</body>
</html>
