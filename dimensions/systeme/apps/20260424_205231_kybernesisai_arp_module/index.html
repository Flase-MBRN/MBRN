<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBRN Factory-Ready Module</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 20px;
        }

        .module-header {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .module-data {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }

        .module-data table {
            width: 100%;
            border-collapse: collapse;
        }

        .module-data th, .module-data td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .module-data th {
            background-color: #f2f2f2;
        }

        .module-data tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .module-data .agent-card {
            margin-top: 15px;
        }

        .module-data .agent-card h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="module-header">
        <h1>MBRN Factory-Ready Module</h1>
        <p>Source Alpha: KybernesisAI/arp</p>
        <p>Alpha ID: alpha_1218247987</p>
        <p>ROI Score: 85.0</p>
        <p>Manufactured At: 2026-04-24T20:52:31.345560+00:00</p>
        <p>Agent Attempts: 1</p>
    </div>

    <div class="module-data">
        <h2>ARP Document</h2>

        <script>
            const arpDocument = `{
                "did": "did:example:123456",
                "agentCard": {
                    "name": "Example Agent",
                    "description": "An example agent",
                    "capabilities": ["connect", "sendMessage"]
                },
                "connections": [
                    {"did": "did:example:789012", "status": "pending"},
                    {"did": "did:example:345678", "status": "accepted"}
                ]
            }`;

            const arpDoc = JSON.parse(arpDocument);

            // Function to display data in a table
            function displayData(data, containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const table = document.createElement('table');

                // Display agentCard
                if (data.agentCard) {
                    const agentCardDiv = document.createElement('div');
                    agentCardDiv.classList.add('agent-card');
                    const h3 = document.createElement('h3');
                    h3.textContent = data.agentCard.name;
                    agentCardDiv.appendChild(h3);
                    const pDescription = document.createElement('p');
                    pDescription.textContent = data.agentCard.description;
                    agentCardDiv.appendChild(pDescription);
                    const ulCapabilities = document.createElement('ul');
                    data.agentCard.capabilities.forEach(capability => {
                        const li = document.createElement('li');
                        li.textContent = capability;
                        ulCapabilities.appendChild(li);
                    });
                    agentCardDiv.appendChild(ulCapabilities);
                    container.appendChild(agentCardDiv);
                }

                // Display connections
                if (data.connections && data.connections.length > 0) {
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    const didHeader = document.createElement('th');
                    didHeader.textContent = 'DID';
                    const statusHeader = document.createElement('th');
                    statusHeader.textContent = 'Status';
                    headerRow.appendChild(didHeader);
                    headerRow.appendChild(statusHeader);
                    thead.appendChild(headerRow);

                    const tbody = document.createElement('tbody');
                    data.connections.forEach(connection => {
                        const row = document.createElement('tr');
                        const didCell = document.createElement('td');
                        didCell.textContent = connection.did;
                        const statusCell = document.createElement('td');
                        statusCell.textContent = connection.status;
                        row.appendChild(didCell);
                        row.appendChild(statusCell);
                        tbody.appendChild(row);
                    });

                    table.appendChild(thead);
                    table.appendChild(tbody);
                    container.appendChild(table);
                }
            }

            // Display the ARP document data
            displayData(arpDoc, 'arp-document-container');
        </script>

        <div id="arp-document-container"></div>

        <p>MODULE_READY: KybernesisAI_arp</p>
    </div>

</body>
</html>
