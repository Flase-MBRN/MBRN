<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analysis</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        #container {
            max-width: 800px;
            margin: 0 auto;
        }

        #input-area {
            margin-bottom: 20px;
        }

        #code-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        #language-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
        }

        #analyze-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            width: auto;
        }

        #result-area {
            border: 1px solid #ddd;
            padding: 15px;
            background-color: #f9f9f9;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Code Analysis</h1>

        <div id="input-area">
            <textarea id="code-input" placeholder="Enter code here"></textarea>
            <select id="language-select">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="java">Java</option>
                <option value="c++">C++</option>
            </select>
            <button id="analyze-button">Analyze</button>
        </div>

        <div id="result-area">
            <h2>Analysis Result</h2>
            <p id="result-message"></p>
            <pre id="result-output"></pre>
        </div>
    </div>

    <script>
        document.getElementById('analyze-button').addEventListener('click', () => {
            const code = document.getElementById('code-input').value;
            const language = document.getElementById('language-select').value;

            document.getElementById('result-message').textContent = 'Analyzing...';
            document.getElementById('result-output').textContent = '';

            // Simulate the Python analyze_code function
            setTimeout(() => {
                const result = analyzeCode(code, language);
                displayResult(result);
            }, 500);
        });

        function analyzeCode(code, language) {
            let syntax_check = {
                "valid": code.length > 10,
                "errors": code.length <= 10 ? ["Syntax error at line 1"] : []
            };

            let analysis = {
                "language": language,
                "issues": [{ "type": "performance", "description": "Code could be optimized" }, { "type": "readability", "description": "Consider refactoring for clarity" }]
            };

            return {
                "status": "success",
                "syntax_check": syntax_check,
                "analysis": analysis
            };
        }

        function displayResult(result) {
            const resultMessage = document.getElementById('result-message');
            const resultOutput = document.getElementById('result-output');

            if (result.status === 'success') {
                resultMessage.textContent = 'Analysis completed successfully.';
                resultMessage.className = 'success';
                resultOutput.textContent = JSON.stringify(result, null, 4);
            } else {
                resultMessage.textContent = 'Analysis failed.';
                resultMessage.className = 'error';
                resultOutput.textContent = JSON.stringify(result, null, 4);
            }
        }
    </script>
</body>
</html>
