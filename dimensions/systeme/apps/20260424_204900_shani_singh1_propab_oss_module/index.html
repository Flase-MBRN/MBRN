        <div id="result-container">
            <h2>Shortest Path Calculation</h2>
            <div id="result"></div>
        </div>

        <script>
            const graph = {
                'A': ['B', 'C'],
                'B': ['D', 'E'],
                'C': ['F'],
                'D': [],
                'E': ['F'],
                'F': []
            };

            const startNode = 'A';
            const goalNode = 'F';

            function findShortestPath(graph, start, goal) {
                const queue = [[start, [start]]];
                const visited = new Set();

                while (queue.length > 0) {
                    const [currentNode, path] = queue.shift();

                    if (currentNode === goal) {
                        return path;
                    }

                    if (!visited.has(currentNode)) {
                        visited.add(currentNode);
                        const neighbors = graph[currentNode];
                        if (neighbors) {
                            for (const neighbor of neighbors) {
                                if (!visited.has(neighbor)) {
                                    queue.push([neighbor, path.concat(neighbor)]);
                                }
                            }
                        }
                    }
                }

                return null;
            }

            const path = findShortestPath(graph, startNode, goalNode);
            let resultText = "";

            if (path) {
                resultText = `Shortest path from ${startNode} to ${goalNode} is: ${path.join(', ')}`;
            } else {
                resultText = `No path found between ${startNode} and ${goalNode}`;
            }

            document.getElementById('result').textContent = resultText;

            console.log("MODULE_READY: shani_singh1_propab_oss");
        </script>
