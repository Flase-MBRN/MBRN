<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Visualizer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
        }

        .paper {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
        }

        .paper h2 {
            margin-top: 0;
            color: #0056b3;
        }

        .content {
            white-space: pre-wrap; /* Preserve whitespace and line breaks */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paper Visualizer</h1>

        <script>
            const sampleData = {
                "papers": [
                    {
                        "slug": "paper1",
                        "zh": {
                            "title": "论文一",
                            "content_zh": "这是一篇中文论文的内容。"
                        },
                        "en": {
                            "title": "Paper One",
                            "content_en": "This is the content of a paper in English."
                        }
                    },
                    {
                        "slug": "paper2",
                        "zh": {
                            "title": "论文二",
                            "content_zh": "这是另一篇中文论文的内容。"
                        },
                        "en": {
                            "title": "Paper Two",
                            "content_en": "This is the content of another paper in English."
                        }
                    }
                ]
            };

            function parsePapers(data) {
                const papersData = {};
                for (const paper of data.papers) {
                    const slug = paper.slug;
                    papersData[slug] = {
                        meta: paper,
                        content: {}
                    };

                    for (const lang of ['zh', 'en']) {
                        if (paper[`content_${lang}`]) {
                            papersData[slug].content[lang] = paper[`content_${lang}`];
                        }
                    }
                }
                return papersData;
            }

            const parsedPapers = parsePapers(sampleData);

            function renderPapers() {
                const papersContainer = document.createElement('div');
                for (const slug in parsedPapers) {
                    const paper = parsedPapers[slug];

                    const paperDiv = document.createElement('div');
                    paperDiv.classList.add('paper');

                    const title = document.createElement('h2');
                    title.textContent = paper.meta.zh.title || paper.meta.en.title;
                    paperDiv.appendChild(title);

                    const content = document.createElement('div');
                    content.classList.add('content');
                    content.textContent = (paper.content.zh && paper.content.zh.content_zh) ? paper.content.zh.content_zh : (paper.content.en && paper.content.en.content_en) ? paper.content.en.content_en : "";
                    paperDiv.appendChild(content);

                    papersContainer.appendChild(paperDiv);
                }

                document.querySelector('.container').appendChild(papersContainer);
            }

            renderPapers();
        </script>
    </div>
</body>
</html>
