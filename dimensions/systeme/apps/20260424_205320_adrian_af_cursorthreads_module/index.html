<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Threads</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
        }

        p {
            line-height: 1.6;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 8px;
        }

        .color-code {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cursor Threads</h1>
        <p>MBRN Factory-Ready Module</p>
        <p>Source Alpha: adrian-af/cursorThreads</p>
        <p>Alpha ID: alpha_1219977800</p>
        <p>ROI Score: 85.0</p>
        <p>Manufactured At: 2026-04-24T20:53:20.962590+00:00</p>
        <p>Agent Attempts: 1</p>

        <h2>Parsed Thread Data:</h2>
        <div id="thread-data">
            <ul id="thread-list">
                <!-- Thread data will be dynamically inserted here -->
            </ul>
        </div>
    </div>

    <script>
        const dmc_sample_data = {
            "threads": [
                {"colorCode": "123", "threadName": "Thread A"},
                {"colorCode": "456", "threadName": "Thread B"},
                {"colorCode": "123", "threadName": "Thread C"}
            ]
        };

        function parse_thread_data(dmc_catalog) {
            const threads = {};
            for (const item of dmc_catalog.threads) {
                const color_code = item.colorCode;
                const thread_name = item.threadName;
                if (!threads[color_code]) {
                    threads[color_code] = [];
                }
                threads[color_code].push(thread_name);
            }
            return threads;
        }

        const parsed_data = parse_thread_data(dmc_sample_data);

        function displayThreadData(data) {
            const threadList = document.getElementById('thread-list');
            for (const colorCode in data) {
                const threadNames = data[colorCode];
                const listItem = document.createElement('li');
                listItem.innerHTML = `<span class="color-code">${colorCode}:</span> ${threadNames.join(', ')}`;
                threadList.appendChild(listItem);
            }
        }

        displayThreadData(parsed_data);
    </script>
</body>
</html>
