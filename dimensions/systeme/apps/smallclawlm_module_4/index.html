<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 142335 Aissac Smallclawlm Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 142335 Aissac Smallclawlm Module</h1>
        <label for="specialty-input">Agent Specialty:</label>
<input type="text" id="specialty-input" value="research">
<button id="create-agent-button">Create Agent</button>

<label for="query-input">Query:</label>
<input type="text" id="query-input" value="What are the latest fusion energy breakthroughs?">
<button id="run-agent-button">Run Agent</button>

<div id="result-area"></div>

<script>
const createAgent = (specialty) => {
    const specialties = {
        "research": { notebook_id: "abc123", tools: ["research"] },
        "podcast": { notebook_id: "def456", tools: ["podcast"] }
    };

    if (specialties[specialty]) {
        return {
            notebook_id: specialties[specialty].notebook_id,
            tools: specialties[specialty].tools
        };
    } else {
        throw new Error("Unsupported specialty");
    }
};

const runAgent = (agent, query) => {
    if (agent.tools === ["research"]) {
        return { result: `Researching: ${query}` };
    } else if (agent.tools === ["podcast"]) {
        return { result: `Creating a podcast about: ${query}` };
    } else {
        return { error: "Unsupported tools" };
    }
};

document.getElementById("create-agent-button").addEventListener("click", () => {
    const specialtyInput = document.getElementById("specialty-input").value;
    try {
        const agentData = createAgent(specialtyInput);
        const resultArea = document.getElementById("result-area");
        resultArea.innerHTML = `<p>Agent created with specialty: ${specialtyInput}, notebook_id: ${agentData.notebook_id}, tools: ${agentData.tools.join(", ")}</p>`;
    } catch (error) {
        document.getElementById("result-area").innerHTML = `<p>Error: ${error.message}</p>`;
    }
});

document.getElementById("run-agent-button").addEventListener("click", () => {
    const specialtyInput = document.getElementById("specialty-input").value;
    const queryInput = document.getElementById("query-input").value;

    try {
        const agentData = createAgent(specialtyInput);
        const result = runAgent(agentData, queryInput);
        const resultArea = document.getElementById("result-area");

        if (result.error) {
            resultArea.innerHTML = `<p>Error: ${result.error}</p>`;
        } else {
            resultArea.innerHTML = `<p>Result: ${result.result}</p>`;
        }
    } catch (error) {
        const resultArea = document.getElementById("result-area");
        resultArea.innerHTML = `<p>Error: ${error.message}</p>`;
    }
});
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
