<script>
function recommend() {
  const location = document.getElementById('location').value;
  const tripDuration = parseInt(document.getElementById('trip_duration').value);
  const interestsString = document.getElementById('interests').value;
  const interests = interestsString.split(',').map(interest => interest.trim());

  const sampleDestinations = [
    {"name": "Kyoto", "country": "Japan", "type": "culture"},
    {"name": "Hiroshima", "country": "Japan", "type": "history"},
    {"name": "Mount Fuji", "country": "Japan", "type": "nature"}
  ];

  let recommendedDestinations = [];

  for (let i = 0; i < sampleDestinations.length; i++) {
    const destination = sampleDestinations[i];
    if (destination.country === location) {
      let match = false;
      for (let j = 0; j < interests.length; j++) {
        if (destination.type === interests[j]) {
          match = true;
          break;
        }
      }
      if (match) {
        recommendedDestinations.push(destination);
      }
    }
    if (recommendedDestinations.length >= 2) {
      break;
    }
  }

  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = `<pre>${JSON.stringify(recommendedDestinations, null, 2)}</pre>`;
}

// Additional functionality:  Filter destinations based on user preferences.
// Using Array.filter and Array.map for more complex filtering and transformation.

function filterDestinations(userPreferences, destinations) {
    const location = userPreferences.location;
    const tripDuration = userPreferences.trip_duration;
    const interests = userPreferences.interests;

    const filteredDestinations = destinations.filter(destination => {
        return destination.country === location;
    });

    const matchedDestinations = filteredDestinations.filter(destination => {
        return interests.includes(destination.type);
    });

    return matchedDestinations.slice(0, 2); // Limit to 2 recommendations
}

// Example usage of filterDestinations (not directly called by the UI, but demonstrates the logic)

];

// Math.random() example (for generating a random recommendation if no matches are found)
function getRandomDestination(destinations) {
    const randomIndex = Math.floor(Math.random() * destinations.length);
    return destinations[randomIndex];
}
