<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Verification Tool</title>
</head>
<body>
    <div class="tool-card">
        <h1>Skills Verification Tool</h1>
        <p>Enter the repository URL and layers to verify skills.</p>

        <input type="text" id="repoUrl" placeholder="Repository URL (e.g., https://github.com/huxiaoman7/skills-eval)">
        <input type="text" id="layers" placeholder="Layers (e.g., 1,2,3)">

        <button onclick="verifySkills()">Verify Skills</button>

        <div id="result">
            <!-- Results will be displayed here -->
        </div>
    </div>

    <script>
        function verifySkills() {
            const repoUrl = document.getElementById('repoUrl').value;
            const layers = document.getElementById('layers').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = "<p>Verifying... Please wait.</p>";

            // Simulate the Python logic (simplified)
            setTimeout(() => {
                // In a real implementation, you would send the repoUrl and layers to a backend server
                // that would execute the Python script.  Here, we simulate the result.

                let simulatedResults = {};
                if (repoUrl === "https://github.com/huxiaoman7/skills-eval" && layers === "1,2,3") {
                    simulatedResults = {
                        "skill_1": { "status": "verified", "content": "Simulated Content for Skill 1" },
                        "skill_2": { "status": "verified", "content": "Simulated Content for Skill 2" },
                        "skill_3": { "status": "verified", "content": "Simulated Content for Skill 3" }
                    };
                } else {
                    simulatedResults = {
                        "skill_1": { "status": "not found" },
                        "skill_2": { "status": "not found" },
                        "skill_3": { "status": "not found" }
                    };
                }

                let resultHtml = "<h2>Verification Results:</h2>";
                for (const skill in simulatedResults) {
                    resultHtml += `<p>${skill}: ${simulatedResults[skill].status}`;
                    if (simulatedResults[skill].content) {
                        resultHtml += `<br>Content: ${simulatedResults[skill].content}`;
                    }
                    resultHtml += "</p>";
                }

                resultDiv.innerHTML = resultHtml;
            }, 1000); // Simulate a 1-second delay
        }
    </script>
</body>
</html>
