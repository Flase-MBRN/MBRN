<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Nexus Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Discord Nexus Module</h1>
        <div id="input-area">
  <label for="message-content">Message Content:</label><br>
  <textarea id="message-content" rows="4" cols="50"></textarea><br><br>

  <button id="dispatch-claude">Dispatch to Claude</button>
  <button id="dispatch-codex">Dispatch to Codex</button>
  <button id="dispatch-local-llm">Dispatch to Local LLM</button>
  <button id="dispatch-all">Dispatch to All</button>
</div>

<div id="result-area">
  <!-- Results will be displayed here -->
</div>

<script src="../../../../shared/js/mbrn_storage.js"></script>
<script>
  const messageContentInput = document.getElementById('message-content');
  const dispatchClaudeButton = document.getElementById('dispatch-claude');
  const dispatchCodexButton = document.getElementById('dispatch-codex');
  const dispatchLocalLLMButton = document.getElementById('dispatch-local-llm');
  const dispatchAllButton = document.getElementById('dispatch-all');
  const resultArea = document.getElementById('result-area');

  const agents = {
    "Claude": {
      respond: (message) => "Claude's response to the message."
    },
    "Codex": {
      respond: (message) => "Codex's response to the message."
    },
    "Local LLM": {
      respond: (message) => "Local LLM's response to the message."
    }
  };

  const dispatcher = {
    dispatch: (agentName, message) => {
      const agent = agents[agentName];
      if (agent) {
        return agent.respond(message);
      }
      return "Agent not found.";
    },
    dispatch_to_all: (message) => {
      let responses = [];
      for (const agentName in agents) {
        responses.push(dispatcher.dispatch(agentName, message));
      }
      return responses.join("<br>");
    }
  };


  dispatchClaudeButton.addEventListener('click', () => {
    const message = { content: messageContentInput.value };
    const response = dispatcher.dispatch("Claude", message);
    resultArea.innerHTML = `<b>Claude:</b> ${response}`;
  });

  dispatchCodexButton.addEventListener('click', () => {
    const message = { content: messageContentInput.value };
    const response = dispatcher.dispatch("Codex", message);
    resultArea.innerHTML = `<b>Codex:</b> ${response}`;
  });

  dispatchLocalLLMButton.addEventListener('click', () => {
    const message = { content: messageContentInput.value };
    const response = dispatcher.dispatch("Local LLM", message);
    resultArea.innerHTML = `<b>Local LLM:</b> ${response}`;
  });

  dispatchAllButton.addEventListener('click', () => {
    const message = { content: messageContentInput.value };
    const responses = dispatcher.dispatch_to_all(message);
    resultArea.innerHTML = `<b>All Agents:</b><br>${responses}`;
  });
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
