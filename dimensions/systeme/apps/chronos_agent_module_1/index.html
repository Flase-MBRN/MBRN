<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 103711 Chengfei867 Chronos Agent Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 103711 Chengfei867 Chronos Agent Module</h1>
        <label for="agentOutput">Agent Output (JSON):</label><br>
<textarea id="agentOutput" rows="10" cols="50">
{
  "id": "root",
  "decision": "Start",
  "left": {
    "id": "A1",
    "decision": "Option A",
    "left": {
      "id": "B1",
      "decision": "Sub-option B1",
      "left": null,
      "right": {
        "id": "C1",
        "decision": "Sub-sub-option C1",
        "left": null,
        "right": null
      }
    },
    "right": {
      "id": "B2",
      "decision": "Option B",
      "left": null,
      "right": null
    }
  },
  "right": {
    "id": "A2",
    "decision": "Option A2",
    "left": null,
    "right": null
  }
}
</textarea><br>
<label for="targetNode">Target Node:</label><br>
<input type="text" id="targetNode" value="Sub-sub-option C1"><br><br>
<button onclick="calculatePath()">Calculate Path</button><br><br>
<div id="result-area"></div>

<script>
function parseAgentOutput(output) {
    try {
        return JSON.parse(output);
    } catch (error) {
        return { error: "Invalid JSON" };
    }
}

function traverseTree(tree, node) {
    let queue = [[tree, []]];

    while (queue.length > 0) {
        let [current_node, path] = queue.shift();

        if (current_node.id === node) {
            return path.concat([current_node.decision]);
        }

        if (current_node.left && current_node.left) {
            queue.push([current_node.left, path.concat([current_node.decision])]);
        }

        if (current_node.right && current_node.right) {
            queue.push([current_node.right, path.concat([current_node.decision])]);
        }
    }

    return null;
}

function calculatePath() {
    const agentOutput = document.getElementById("agentOutput").value;
    const targetNode = document.getElementById("targetNode").value;

    const parsedTree = parseAgentOutput(agentOutput);

    if (parsedTree.error) {
        document.getElementById("result-area").innerText = parsedTree.error;
        return;
    }

    const path = traverseTree(parsedTree, targetNode);

    let resultText = "";
    if (path) {
        resultText = "Path to " + targetNode + ": " + path.join(" -> ");
    } else {
        resultText = "Node not found in the tree.";
    }

    document.getElementById("result-area").innerText = resultText;

    // Simulate MODULE_READY message (for demonstration)
    console.log("MODULE_READY: chengfei867_chronos_agent");
}
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
