<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260425 165115 Firaseth Hivemind Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>20260425 165115 Firaseth Hivemind Module</h1>
        <label for="supervisorModel">Supervisor Model:</label>
<input type="text" id="supervisorModel" value="claude-opus-4-7"><br>

<label for="supervisorProvider">Supervisor Provider:</label>
<input type="text" id="supervisorProvider" value="anthropic"><br>

<label for="specialistCount">Number of Specialists:</label>
<input type="number" id="specialistCount" value="2"><br>

<div id="specialist-inputs"></div>

<label for="supervisorPrompt">Supervisor Prompt:</label>
<input type="text" id="supervisorPrompt" value="Delegate research and summarisation to specialists."><br>

<button id="generateButton">Generate Configuration</button>

<div id="result-area"></div>

<script>
const specialistCountInput = document.getElementById('specialistCount');
const specialistInputsDiv = document.getElementById('specialist-inputs');
const supervisorModelInput = document.getElementById('supervisorModel');
const supervisorProviderInput = document.getElementById('supervisorProvider');
const supervisorPromptInput = document.getElementById('supervisorPrompt');
const generateButton = document.getElementById('generateButton');
const resultArea = document.getElementById('result-area');

function createSpecialistInputs(count) {
    specialistInputsDiv.innerHTML = '';
    for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.innerHTML = `
            <label for="specialistName-${i}">Specialist Name:</label>
            <input type="text" id="specialistName-${i}" value="researcher"><br>
            <label for="specialistPrompt-${i}">Specialist Prompt:</label>
            <input type="text" id="specialistPrompt-${i}" value="You gather facts."><br>
            <label for="specialistModelModel-${i}">Specialist Model Model:</label>
            <input type="text" id="specialistModelModel-${i}" value="claude-haiku-4-5"><br>
            <label for="specialistModelProvider-${i}">Specialist Model Provider:</label>
            <input type="text" id="specialistModelProvider-${i}" value="anthropic"><br>
        `;
        specialistInputsDiv.appendChild(div);
    }
}

createSpecialistInputs(parseInt(specialistCountInput.value));

specialistCountInput.addEventListener('change', function() {
    createSpecialistInputs(parseInt(this.value));
});

generateButton.addEventListener('click', function() {
    const supervisorModel = supervisorModelInput.value;
    const supervisorProvider = supervisorProviderInput.value;
    const supervisorPrompt = supervisorPromptInput.value;
    const specialistCount = parseInt(specialistCountInput.value);

    const specialists = [];
    for (let i = 0; i < specialistCount; i++) {
        const specialistName = document.getElementById(`specialistName-${i}`).value;
        const specialistPrompt = document.getElementById(`specialistPrompt-${i}`).value;
        const specialistModelModel = document.getElementById(`specialistModelModel-${i}`).value;
        const specialistModelProvider = document.getElementById(`specialistModelProvider-${i}`).value;

        specialists.push({
            name: specialistName,
            prompt: specialistPrompt,
            model: {
                model: specialistModelModel,
                provider: specialistModelProvider
            }
        });
    }

    const config = {
        supervisor: {
            model: supervisorModel,
            provider: supervisorProvider,
            specialists: specialists,
            prompt: supervisorPrompt
        }
    };

    const jsonString = JSON.stringify(config, null, 4);
    resultArea.innerHTML = `<pre>${jsonString}</pre>`;
});
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
