<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Description Classifier</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        #job-description {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
            min-height: 100px;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Job Description Classifier</h1>
    <textarea id="job-description" placeholder="Enter job description here..."></textarea>
    <button onclick="classifyJob()">Classify</button>
    <div id="result"></div>

    <script>
        function classifyJob() {
            const jobDesc = document.getElementById('job-description').value;
            const resultDiv = document.getElementById('result');

            if (!jobDesc) {
                resultDiv.textContent = "Please enter a job description.";
                return;
            }

            const classification = classify_job_description(jobDesc);

            if (classification) {
                resultDiv.innerHTML = `<pre>${JSON.stringify(classification, null, 2)}</pre>`;
            } else {
                resultDiv.textContent = "Unclassified";
            }
        }

        function classify_job_description(job_desc) {
            const seniority_map = {
                "junior": ["entry level", "graduate"],
                "mid": ["3-5 years", "intermediate"],
                "senior": ["7+ years", "lead", "principal"],
                "staff-plus": ["staff"]
            };

            const work_mode_map = {
                "remote": ["fully remote"],
                "hybrid": ["hybrid"],
                "onsite": ["onsite"]
            };

            const industry_map = {
                "fintech": ["fintech", "financial technology"],
                "healthtech": ["health tech", "healthcare technology"],
                "consumer": ["consumer goods"],
                "enterprise-saas": ["enterprise saas"],
                "other": []
            };

            const words = job_desc.toLowerCase().split();

            let classification = {};

            for (const level in seniority_map) {
                if (seniority_map[level].some(keyword => words.includes(keyword))) {
                    classification["seniority"] = level;
                    break;
                }
            }

            for (const mode in work_mode_map) {
                if (work_mode_map[mode].some(keyword => words.includes(keyword))) {
                    classification["work_mode"] = mode;
                    break;
                }
            }

            for (const industry in industry_map) {
                if (industry_map[industry].some(keyword => words.includes(keyword))) {
                    classification["industry"] = industry;
                    break;
                }
            }

            return Object.keys(classification).length > 0 ? classification : null;
        }
    </script>
</body>
</html>
