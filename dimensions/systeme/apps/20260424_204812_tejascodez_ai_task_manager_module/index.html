<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #0056b3;
            color: white;
        }

        .status-todo {
            color: #f44336;
        }

        .status-inprogress {
            color: #ff9800;
        }

        .status-done {
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Task Manager</h1>

        <script>
            const taskData = `
            [
                {"id": 1, "title": "Task One", "status": "To Do"},
                {"id": 2, "title": "Task Two", "status": "In Progress"},
                {"id": 3, "title": "Task Three", "status": "Done"}
            ]
            `;

            const tasks = JSON.parse(taskData);

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            tasks.forEach(task => {
                let statusClass = "";
                switch (task.status) {
                    case "To Do":
                        statusClass = "status-todo";
                        break;
                    case "In Progress":
                        statusClass = "status-inprogress";
                        break;
                    case "Done":
                        statusClass = "status-done";
                        break;
                }

                tableHTML += `
                    <tr>
                        <td>${task.id}</td>
                        <td>${task.title}</td>
                        <td class="${statusClass}">${task.status}</td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            document.write(tableHTML);
        </script>
    </div>
</body>
</html>
