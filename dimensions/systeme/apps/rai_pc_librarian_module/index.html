<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rai Pc Librarian Module | MBRN Hub</title>
    <style>
        body { background-color: #05050A; color: #E0E0E0; font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .tool-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        h1 { font-size: 22px; font-weight: 800; color: #7B5CF5; margin-bottom: 24px; text-align: center; letter-spacing: -0.02em; }
        label { display: block; font-size: 11px; font-weight: 700; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
        input, textarea, select { background: #1A1A24; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: #7B5CF5; outline: none; background: #1F1F2E; }
        button { background-color: #7B5CF5; color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: all 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        button:hover { background-color: #8C72F7; transform: translateY(-1px); }
        #result-area { margin-top: 24px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(123, 92, 245, 0.2); font-family: monospace; font-size: 13px; color: #AFA; white-space: pre-wrap; word-break: break-all; }
        .meta-footer { margin-top: 32px; text-align: center; font-size: 10px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="tool-card">
        <h1>Rai Pc Librarian Module</h1>
        <div id="input-area">
  <label for="keyword-input">Keyword:</label>
  <input type="text" id="keyword-input" placeholder="Enter keyword">
  <label for="regex-input">Regex:</label>
  <input type="checkbox" id="regex-input">
  <button id="search-button">Search Code</button>

  <label for="src-input">Source File:</label>
  <input type="text" id="src-input" placeholder="Enter source file path">
  <label for="dest-input">Destination File:</label>
  <input type="text" id="dest-input" placeholder="Enter destination file path">
  <button id="move-button">Move File</button>
</div>

<div id="result-area"></div>

<script>
const root_dir = "sample_repo"; // Hardcoded for self-test

class PCLibrarian {
  constructor(root_dir) {
    this.root_dir = root_dir;
    this.memory = []; // Simulate deque with array
  }

  search_code(keyword, regex) {
    const matches = [];
    const files = this.getAllFiles(this.root_dir);

    for (const filePath of files) {
      try {
        const content = this.readFile(filePath);
        if (regex) {
          const regExp = new RegExp(keyword);
          if (regExp.test(content)) {
            matches.push(filePath);
          }
        } else {
          if (content.includes(keyword)) {
            matches.push(filePath);
          }
        }
      } catch (error) {
        console.error(`Error reading file ${filePath}: ${error}`);
      }
    }
    return matches;
  }

  move_file(src, dest) {
    if (this.isFile(src) && this.isDir(os.path.dirname(dest))) {
      try {
        // Simulate shutil.move
        this.copyFile(src, dest);
        this.deleteFile(src);
        return true;
      } catch (error) {
        console.error(`Error moving file: ${error}`);
        return false;
      }
    }
    return false;
  }

  getAllFiles(dirPath) {
    let files = [];
    const fs = require('fs');
    const path = require('path');

    function walk(dir) {
      const entries = fs.readdirSync(dir, { withFileTypes: true });
      for (const entry of entries) {
        const fullPath = path.join(dir, entry.name);
        if (entry.isDirectory()) {
          walk(fullPath);
        } else {
          files.push(fullPath);
        }
      }
    }

    walk(dirPath);
    return files;
  }

  readFile(filePath) {
    const fs = require('fs');
    try {
      return fs.readFileSync(filePath, 'utf-8');
    } catch (error) {
      throw error;
    }
  }

  isFile(filePath) {
    const fs = require('fs');
    return fs.existsSync(filePath) && fs.statSync(filePath).isFile();
  }

  isDir(dirPath) {
    const fs = require('fs');
    return fs.existsSync(dirPath) && fs.statSync(dirPath).isDirectory();
  }

  copyFile(src, dest) {
    const fs = require('fs');
    fs.copyFileSync(src, dest);
  }

  deleteFile(filePath) {
    const fs = require('fs');
    fs.unlinkSync(filePath);
  }
}

const librarian = new PCLibrarian(root_dir);

document.getElementById('search-button').addEventListener('click', () => {
  const keyword = document.getElementById('keyword-input').value;
  const regex = document.getElementById('regex-input').checked;
  const matches = librarian.search_code(keyword, regex);
  document.getElementById('result-area').innerHTML = `<h3>Search Results:</h3><ul>${matches.map(match => `<li>${match}</li>`).join('')}</ul>`;
});

document.getElementById('move-button').addEventListener('click', () => {
  const src = document.getElementById('src-input').value;
  const dest = document.getElementById('dest-input').value;
  const success = librarian.move_file(src, dest);
  document.getElementById('result-area').innerHTML = `<h3>Move File Result:</h3><p>${success ? 'Success' : 'Failure'}</p>`;
});

// Simulate module readiness message
document.getElementById('result-area').innerHTML += `<p style="font-size: small;">MODULE_READY: devansh_rai_PC_Librarian</p>`;
</script>
        <div class="meta-footer">MBRN Factory Autonomous Module</div>
    </div>
</body>
</html>
