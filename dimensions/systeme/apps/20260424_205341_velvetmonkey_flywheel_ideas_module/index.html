<body>
    <div class="module-container">

        <p><strong>Agent Attempts:</strong> 1</p>

        <h2>Dependency Graph</h2>
        <pre id="dependencyGraph"></pre>

        <script>
            const ideasData = [
                {"id": 1, "assumption": "Assumption A", "dependent_ideas": [2]},
                {"id": 2, "assumption": "Assumption B", "dependent_ideas": [3]},
                {"id": 3, "assumption": "Assumption C", "dependent_ideas": []}
            ];

            function processIdeas(ideas) {
                const dependencyGraph = {};
                for (const idea of ideas) {
                    const assumption = idea.assumption;
                    if (idea.dependent_ideas) {
                        for (const dep of idea.dependent_ideas) {
                            if (!dependencyGraph[dep]) {
                                dependencyGraph[dep] = [];
                            }
                            dependencyGraph[dep].push(assumption);
                        }
                    }
                }
                return dependencyGraph;
            }

            const dependencyGraph = processIdeas(ideasData);
            const dependencyGraphString = JSON.stringify(dependencyGraph, null, 4);
            document.getElementById('dependencyGraph').textContent = dependencyGraphString;

            console.log("MODULE_READY: velvetmonkey_flywheel_ideas");
        </script>
    </div>
