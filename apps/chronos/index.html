<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos Protocol — MBRN Hub</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- MBRN Design System -->
  <link rel="stylesheet" href="../../shared/ui/theme.css">
  <link rel="stylesheet" href="../../shared/ui/components.css">
</head>
<body class="void-bg bg-glow">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>
    
    <nav class="nav-menu">
      <a class="nav-item" href="../index.html">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </a>
      <a class="nav-item" href="../dashboard/">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item active" href="./">
        <span class="nav-icon">◷</span>
        <span class="nav-label">Chronos</span>
      </a>
      <a class="nav-item" href="../apps/numerology/">
        <span class="nav-icon">○</span>
        <span class="nav-label">Numerology</span>
      </a>
      <a class="nav-item" href="../apps/finance/">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Finance</span>
      </a>
    </nav>
    
    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    
    <!-- HERO SECTION -->
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">✦ Dim 06 — Chronos</div>
      <h1 class="hero-title">CHRONOS<br>PROTOCOL</h1>
      <p class="hero-subtitle">Tägliche Frequenzen als operatives Navigationsinstrument</p>
    </section>
    
    <!-- INPUT SECTION -->
    <section class="tool-section reveal">
      <div class="glass-card text-center">
        <h3 class="section-eyebrow">
          Geburtsdatum
        </h3>
        <div class="form-group form-container-compact">
          <label for="chrono-birthdate">Referenz-Datum (TT.MM.JJJJ)</label>
          <input type="text" id="chrono-birthdate" placeholder="z.B. 15.08.1990">
        </div>
        <button class="btn-primary mt-24 form-container-compact" id="chrono-calc-btn">
          Zeit-Zyklen berechnen
        </button>
        <p id="chrono-error" class="text-accent text-center mt-16"></p>
      </div>
    </section>

    <!-- RESULTS AREA — Dynamically filled by render.js -->
    <section class="tool-section reveal hidden" id="chrono-results-area"></section>

  </main>

  <!-- Render Modul -->
  <script type="module" src="./render.js"></script>

</body>
</html>
