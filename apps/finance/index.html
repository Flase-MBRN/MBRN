<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance App - MBRN Hub</title>
  
  <link rel="stylesheet" href="../../shared/ui/theme.css">
  <link rel="stylesheet" href="../../shared/ui/components.css">
  
  <!-- Fonts: Syne (Display) + Inter (Body) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="void-bg bg-grid">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>
    
    <nav class="nav-menu">
      <a class="nav-item" data-route="home">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </a>
      <a class="nav-item" data-route="dashboard">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item active" data-route="finance">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Finance</span>
      </a>
      <a class="nav-item" data-route="numerology">
        <span class="nav-icon">◐</span>
        <span class="nav-label">Numerologie</span>
      </a>
    </nav>
    
    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <!-- Background Glow -->
  <div class="bg-glow"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    
    <!-- HERO SECTION -->
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">✦ Financial Intelligence</div>
      <h1 class="hero-title">QUANTUM<br>FINANCE</h1>
      <p class="hero-subtitle">Deine Mathe-Maschine für Vermögensaufbau</p>
    </section>
    
    <!-- INPUT SECTION -->
    <section class="tool-section reveal">
      <div class="section-card">
        <h2 class="text-accent mb-24">Eingabe</h2>
        
        <div class="input-grid">
          <div class="form-group">
            <label for="input-principal">Startkapital (€)</label>
            <input type="number" id="input-principal" value="10000">
          </div>
          <div class="form-group">
            <label for="input-rate">Zinssatz (%)</label>
            <input type="number" id="input-rate" value="5">
          </div>
          <div class="form-group">
            <label for="input-years">Laufzeit (Jahre)</label>
            <input type="number" id="input-years" value="10">
          </div>
          <div class="form-group">
            <label for="input-monthly">Monatliche Rate (€)</label>
            <input type="number" id="input-monthly" value="100">
          </div>
        </div>
        
        <button class="btn-primary" id="calc-btn">Jetzt Berechnen</button>
        <p id="finance-error" class="text-accent text-center mt-16"></p>
      </div>
    </section>

    <!-- RESULTS SECTION -->
    <section class="tool-section reveal" id="results-section">
      <div class="section-card results-card">
        <h2 class="text-accent mb-24">Ergebnis</h2>
        <div class="results-grid">
          <div class="result-row">
            <span class="result-label">Endkapital:</span>
            <span class="result-value" id="res-final">- €</span>
          </div>
          <div class="result-row">
            <span class="result-label">Eingezahlt:</span>
            <span id="res-invested">- €</span>
          </div>
          <div class="result-row">
            <span class="result-label">Zinsgewinn:</span>
            <span id="res-interest">- €</span>
          </div>
        </div>
      </div>
    </section>

    <!-- PREMIUM FEATURES -->
    <section class="tool-section reveal">
      <div id="premium-features-container"></div>
    </section>

    <!-- Templates -->
    <template id="pdf-btn-template">
      <button class="btn-primary">📄 PDF Generieren</button>
    </template>
    
    <template id="pdf-locked-template">
      <button class="btn-secondary locked-feature-btn" data-feature="pdf_export" title="Nur ab Level 10 verfügbar">🔒 PDF (Premium Feature)</button>
    </template>

  </main>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Paywall Template -->
  <template id="paywall-template">
    <div class="modal-overlay">
      <div class="modal-content">
        <h2 class="text-accent">Premium Feature</h2>
        <p class="my-16">Das Modul '<span class="paywall-feature-name"></span>' ist nur für Member (Level 10) verfügbar.</p>
        <button class="btn-primary w-full">🌟 Jetzt Upgraden</button>
        <button class="btn-secondary modal-close w-full mt-8">Vielleicht später</button>
      </div>
    </div>
  </template>

  <!-- Render Modul übernimmt Boot + Nav + Animation -->
  <script type="module" src="./render.js"></script>

</body>
</html>
