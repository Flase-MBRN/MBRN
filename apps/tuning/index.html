<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequency Tuner — MBRN Hub</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- MBRN Design System -->
  <link rel="stylesheet" href="../../shared/ui/theme.css">
  <link rel="stylesheet" href="../../shared/ui/components.css">
</head>
<body class="void-bg bg-glow">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>
    
    <nav class="nav-menu" id="nav-menu">
      <!-- Dynamisch gerendert via render_nav.js -->
    </nav>
    
    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    
    <!-- HERO SECTION -->
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">✦ Dim 03 — Nomenklatur</div>
      <h1 class="hero-title">FREQUENCY<br>TUNER</h1>
      <p class="hero-subtitle">Echtzeit-Abgleich von Namen mit der Hardware des Operators</p>
    </section>
    
    <!-- INPUT SECTION — Live Frequency Tuner -->
    <section class="tool-section reveal">
      <div class="glass-card text-center">
        <h3 class="section-eyebrow">
          ◎ Live Frequenz-Analyse
        </h3>
        
        <div class="form-container mb-16">
          <label for="tune-name-input">Name (Echtzeit-Analyse)</label>
          <input type="text" id="tune-name-input" placeholder="Tippe einen Namen..." autocomplete="off">
        </div>
        
        <div class="form-container mb-24">
          <label for="tune-birthdate">Geburtsdatum (optional, für Alignment)</label>
          <input type="text" id="tune-birthdate" placeholder="TT.MM.JJJJ">
        </div>
        
        <p id="tune-status" class="text-secondary status-text mb-16">
          Gib einen Namen ein...
        </p>
      </div>
    </section>

    <!-- RESULTS AREA — Live Frequency Visualization -->
    <section class="tool-section reveal" id="tune-results">
      <div class="glass-card text-center">
        <h3 class="section-eyebrow">
          Namens-Frequenz
        </h3>
        
        <!-- Frequency Value Massive -->
        <div class="stagger-fade mb-24" data-delay="1">
          <span id="tune-frequency-value" class="value-massive accent">-</span>
          <span class="value-label">Numerische Frequenz</span>
        </div>
        
        <!-- Frequency Bar -->
        <div class="stagger-fade form-container-compact mb-24" data-delay="2">
          <div class="progress-bar-container">
            <div id="tune-frequency-bar" class="progress-bar-fill" style="width: 0%; background: var(--text-muted);"></div>
          </div>
        </div>
        
        <!-- Resonance & Alignment -->
        <div class="data-grid compact form-container-compact">
          <div class="stagger-fade card-compact" data-delay="3">
            <span id="tune-resonance" class="stat-value">-</span>
            <span class="value-label">Resonanz</span>
          </div>
          <div class="stagger-fade card-compact" data-delay="4">
            <span id="tune-alignment" class="stat-value-secondary">-</span>
            <span class="value-label">Alignment</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Render Modul -->
  <script type="module" src="./render.js"></script>

</body>
</html>
