<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MBRN Hub</title>
  
  <link rel="stylesheet" href="../shared/ui/theme.css">
  <link rel="stylesheet" href="../shared/ui/components.css">
  
  <!-- Font Stack: Space Grotesk (Main) & Space Mono (Technical) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="void-bg bg-grid">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>
    
    <nav class="nav-menu">
      <a class="nav-item" data-route="home">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </a>
      <a class="nav-item active" data-route="dashboard">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-route="finance">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Finance</span>
      </a>
      <a class="nav-item" data-route="numerology">
        <span class="nav-icon">◐</span>
        <span class="nav-label">Numerologie</span>
      </a>
    </nav>
    
    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="card max-w-400">
      <h1 class="text-center text-accent">Mastery Mirror</h1>
      
      <div class="my-16 text-center">
        <p>Current Tier</p>
        <p style="font-size: 28px; font-weight: bold; margin-top: 8px;" id="dash-tier">-</p>
      </div>
      
      <div class="my-16" style="display: flex; justify-content: space-around; border-top: 1px solid var(--line-color); padding-top: 16px;">
        <div class="text-center">
          <p>🔥 Streak</p>
          <strong id="dash-streak" style="font-size: 24px;">0</strong>
        </div>
        <div class="text-center">
          <p>🛡️ Shields</p>
          <strong id="dash-shields" style="font-size: 24px;">0</strong>
        </div>
      </div>
      
      <div class="my-16" style="margin-top: 24px;">
        <button id="btn-checkin" class="btn-primary" style="width: 100%;">Täglicher Check-In</button>
      </div>
      
      <p id="dash-msg" class="text-center text-accent"></p>

    </div>
  </main>

  <!-- Render Modul übernimmt Boot + Nav -->
  <script type="module" src="./render_dashboard.js"></script>

</body>
</html>
