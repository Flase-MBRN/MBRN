<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MBRN Hub</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:;">

  <link rel="stylesheet" href="../shared/ui/theme.css">
  <link rel="stylesheet" href="../shared/ui/components.css">
  <link rel="stylesheet" href="../shared/ui/factory_feed.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="void-bg bg-grid">

  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>

    <nav class="nav-menu" id="nav-menu"></nav>

    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <div class="bg-glow"></div>

  <main class="main-content">
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">MBRN OS</div>
      <h1 class="hero-title">Dashboard</h1>
      <p class="hero-subtitle">Produktfluss und zentrale Orientierung. Die Arbeit passiert in den Dimensionen.</p>
    </section>

    <section class="tool-section dashboard-flow-section reveal">
      <div id="dashboard-flow-rail"></div>
    </section>

    <section class="tool-section dashboard-dimensions-section reveal">
      <div class="dashboard-section-heading">
        <span class="section-eyebrow-left">Deine Dimensionen</span>
        <p class="text-secondary">Elf kanonische Arbeitsräume. Öffne zuerst die Dimension, nicht die App.</p>
      </div>
      <div id="dashboard-dimension-grid" class="dashboard-dimension-grid"></div>
    </section>

    <section class="tool-section reveal" aria-label="MBRN Factory Feed">
      <div id="factory-feed-root"></div>
    </section>

    <section id="auth-section" class="tool-section reveal">
      <div id="auth-surface-root"></div>
    </section>
  </main>

  <script type="module" src="./render_dashboard.js?v=6.0"></script>
</body>
</html>
