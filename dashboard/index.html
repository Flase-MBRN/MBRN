<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MBRN Hub</title>
  
  <link rel="stylesheet" href="../shared/ui/theme.css">
  <link rel="stylesheet" href="../shared/ui/components.css">
  
  <!-- Fonts: Syne (Display) + Inter (Body) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="void-bg bg-grid">

  <!-- SIDEBAR NAVIGATION -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>
    
    <nav class="nav-menu">
      <a class="nav-item" data-route="home">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">Home</span>
      </a>
      <a class="nav-item active" data-route="dashboard">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" data-route="finance">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Finance</span>
      </a>
      <a class="nav-item" data-route="numerology">
        <span class="nav-icon">◐</span>
        <span class="nav-label">Numerologie</span>
      </a>
    </nav>
    
    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <!-- Background Glow -->
  <div class="bg-glow"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    
    <!-- HERO SECTION -->
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">✦ Command Center</div>
      <h1 class="hero-title">MASTERY<br>MIRROR</h1>
      <p class="hero-subtitle">Dein persönliches Progress-Tracking</p>
    </section>
    
    <!-- DASHBOARD CARD -->
    <section class="tool-section reveal">
      <div class="section-card text-center">
        <h2 class="text-accent mb-24">Current Tier</h2>
        <div class="tier-display">
          <span id="dash-tier" class="tier-value">-</span>
        </div>
        
        <div class="stats-grid my-24">
          <div class="stat-item">
            <span class="stat-label">🔥 Streak</span>
            <span id="dash-streak" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">🛡️ Shields</span>
            <span id="dash-shields" class="stat-value">0</span>
          </div>
        </div>
        
        <button id="btn-checkin" class="btn-primary">Täglicher Check-In</button>
        <p id="dash-msg" class="text-accent text-center mt-16"></p>
      </div>
    </section>

  </main>

  <!-- Render Modul übernimmt Boot + Nav + Animation -->
  <script type="module" src="./render_dashboard.js"></script>

</body>
</html>
