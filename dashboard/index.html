<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MBRN Hub</title>

  <link rel="stylesheet" href="../shared/ui/theme.css">
  <link rel="stylesheet" href="../shared/ui/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="void-bg bg-grid">

  <aside class="nav-sidebar">
    <div class="nav-brand">
      <span class="logo-text">MBRN</span>
    </div>

    <nav class="nav-menu" id="nav-menu"></nav>

    <div class="nav-footer">
      <div id="nav-auth-container"></div>
    </div>
  </aside>

  <div class="bg-glow"></div>

  <main class="main-content">
    <section class="tool-hero reveal">
      <div class="hero-eyebrow">MBRN OS</div>
      <h1 class="hero-title">MBRN</h1>
      <p id="system-status-text" class="hero-subtitle system-status system-status-offline">System offline</p>
    </section>

    <section class="tool-section reveal">
      <div class="glass-card text-center">
        <h2 class="section-eyebrow-left">Dein Profil</h2>

        <div class="tier-display mb-32">
          <span id="dash-tier" class="value-massive accent">-</span>
          <span class="value-label">Status</span>
        </div>

        <div class="data-grid my-32">
          <div class="stat-item stagger-fade" data-delay="1">
            <span class="value-massive" id="dash-streak">0 Tage</span>
            <span class="value-label">CHECK-IN</span>
          </div>
          <div class="stat-item stagger-fade" data-delay="2">
            <span class="value-massive" id="dash-shields">0</span>
            <span class="value-label">PAUSEN-JOKER</span>
          </div>
        </div>

        <p class="text-secondary">Heute bestätigt?</p>
        <div id="dash-loader"></div>
        <button id="btn-checkin" class="btn-primary mt-24">CHECK</button>
        <p id="dash-msg" class="text-accent text-center mt-16"></p>
      </div>
    </section>

    <section class="tool-section reveal">
      <div id="sentiment-widget"></div>
    </section>

    <section class="tool-section reveal">
      <div id="synergy-widget-container"></div>
    </section>

    <section class="tool-section reveal">
      <h3 class="section-eyebrow">Deine Apps</h3>
      <div class="data-grid">
        <a href="../apps/numerology/" class="glass-card stagger-fade app-card-link" data-delay="1">
          <div class="app-icon">Z</div>
          <h4 class="card-title">Zahlen</h4>
          <p class="text-secondary status-text">Dein Muster</p>
        </a>
        <a href="../apps/finance/" class="glass-card stagger-fade app-card-link" data-delay="2">
          <div class="app-icon">G</div>
          <h4 class="card-title">Geld</h4>
          <p class="text-secondary status-text">Dein Wachstum</p>
        </a>
        <a href="../apps/chronos/" class="glass-card stagger-fade app-card-link" data-delay="3">
          <div class="app-icon">T</div>
          <h4 class="card-title">Zeit</h4>
          <p class="text-secondary status-text">Deine Phasen</p>
        </a>
      </div>
    </section>
  </main>

  <script type="module" src="./render_dashboard.js?v=6.0"></script>
</body>
</html>
