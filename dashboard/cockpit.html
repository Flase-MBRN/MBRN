<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBRN COCKPIT 🧬 v2.1</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:;">
  <link rel="stylesheet" href="./cockpit_styles.css">
</head>
<body class="bg-grid">

  <!-- 🧠 TOP SIGNAL (Hero) -->
  <section class="hero-signal" id="hero-signal">
    <div class="system-status-pill">🟢 SYSTEM: ONLINE</div>
    <div class="top-diamond-banner" id="top-diamond-banner">
      <h2>💎 TOP DIAMOND CANDIDATE</h2>
      <h1 id="top-diamond-name">Scanning...</h1>
      <div class="action-badge">⚡ ACTION: READY FOR DEPLOY / MONETIZE</div>
    </div>
  </section>

  <!-- 📡 SYSTEM MONITORING GRID (Restored & Enhanced) -->
  <section class="system-grid" id="system-grid">
    <!-- Populated by JS: 8 Core Processes -->
  </section>

  <!-- 🧬 OPERATIONAL LAYER -->
  <main class="cockpit-main">
    
    <!-- LEFT: DIAMOND FEED (The Goldstream) -->
    <section class="feed-section">
      <h2 class="section-title">✨ DIAMOND FEED <span id="feed-count" style="color: var(--neon-blue); font-size: 0.9rem;">(0)</span></h2>
      <div class="diamond-feed" id="diamond-feed">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- RIGHT: ACTION CENTER -->
    <aside class="sidebar">
      <div class="sidebar-panel">
        <h3 class="section-title" style="font-size: 1rem; margin-bottom: 15px;">⚡ ACTION CENTER</h3>
        <div class="action-stack">
          <button class="btn-action" onclick="window.openTopModule()">📂 Top Module öffnen</button>
          <button class="btn-action gold" onclick="window.convertToTool()">🛠 In Tool umwandeln</button>
          <button class="btn-action" onclick="alert('Integrating into Finance layer...')">💹 In Finanz-Rechner einspeisen</button>
          <button class="btn-action" onclick="alert('Flagging as core feature...')">🎯 Als Feature markieren</button>
        </div>
      </div>

      <div style="font-size: 0.7rem; color: var(--text-secondary); text-align: center; margin-top: 20px;">
        MBRN SYSTEM v2.1 | Hybrid Master Layer
      </div>
    </aside>

  </main>

  <script src="./cockpit_renderer.js"></script>
</body>
</html>
