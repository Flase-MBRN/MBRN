<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBRN - built to be used</title>
  <meta name="description" content="MBRN zeigt dir dein Muster, dein Wachstum und deine Phasen. Klar, direkt und ohne Umwege.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="shared/ui/theme.css">
  <link rel="stylesheet" href="shared/ui/components.css">
  <link rel="stylesheet" href="shared/ui/landing.css">
</head>
<body>
  <section id="hook-section" class="hook-section">
    <div class="bg-glow"></div>

    <nav class="nav-minimal">
      <div class="nav-brand">MBRN</div>
    </nav>

    <div class="hook-content">
      <h1 class="hook-headline">MBRN</h1>
      <p class="hook-subtitle">built to be used</p>

      <form id="frequency-form" class="frequency-form">
        <div class="input-group">
          <label class="input-label" for="input-name">Vollständiger Name</label>
          <input type="text" id="input-name" class="glass-input" placeholder="Max Mustermann" required>
        </div>

        <div class="input-group">
          <label class="input-label" for="input-date">Geburtsdatum</label>
          <input type="date" id="input-date" class="glass-input" required>
        </div>

        <div class="hook-actions">
          <button type="submit" class="pulse-cta">
            <span class="cta-text">Los geht's</span>
          </button>
          <a href="./dashboard/" id="skip-dashboard-link" class="skip-link">Ueberspringen</a>
        </div>
      </form>
    </div>
  </section>

  <section id="loader-section" class="loader-section hidden">
    <div class="terminal-overlay">
      <div class="terminal-header">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
        <span class="terminal-title">MBRN</span>
      </div>
      <div class="terminal-body">
        <div id="terminal-text" class="terminal-text"></div>
        <div class="terminal-progress">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="reveal-section" class="reveal-section hidden">
    <div class="reveal-content">
      <div class="number-display">
        <svg class="number-ring" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6B4CE6"/>
              <stop offset="100%" stop-color="#9f7aea"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="90"/>
          <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="90"/>
        </svg>
        <div id="life-path-number" class="life-path-number">-</div>
      </div>

      <div class="reveal-text">
        <p class="reveal-label">Dein erster Eindruck</p>
        <h2 id="archetype-title" class="archetype-title">Der Architekt</h2>
        <p id="archetype-desc" class="archetype-desc">Hier bekommst du einen schnellen Blick auf dein Muster.</p>
        <p class="reveal-note">Alles Weitere kannst du in Ruhe im Dashboard ansehen oder später nachreichen.</p>
      </div>

      <button id="btn-dashboard" class="unlock-cta-primary">Zum Dashboard</button>
    </div>
  </section>

  <script type="module" src="shared/ui/render_landing.js"></script>
</body>
</html>
